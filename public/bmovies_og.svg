<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="vg" cx="50%" cy="40%" r="80%">
      <stop offset="0%"  stop-color="#1a0003" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#vg)"/>

  <!-- Red-bordered logo box -->
  <rect
    x="200" y="70" width="800" height="240"
    fill="#000000"
    stroke="#E50914" stroke-width="6"
  />

  <!-- bMovies logo, inlined + scaled -->
  <g transform="translate(290 110.175) scale(1.55)">
    <title>bMovies</title>
  <defs>

    <!-- 3D shadow: offset creates depth like the Netflix logo -->
    <filter id="shadow3d" x="-4%" y="-4%" width="115%" height="135%" color-interpolation-filters="sRGB">
      <feDropShadow dx="2.5" dy="4" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.75"/>
    </filter>

    <!-- Warm cinematic glow behind the red block -->
    <filter id="glow-red" x="-15%" y="-25%" width="140%" height="175%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blr"/>
      <feFlood flood-color="#E50914" flood-opacity="0.45" result="clr"/>
      <feComposite in="clr" in2="blr" operator="in" result="halo"/>
      <feMerge><feMergeNode in="halo"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle glow behind the white "b" -->
    <filter id="glow-white" x="-15%" y="-25%" width="140%" height="175%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blr"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.30" result="clr"/>
      <feComposite in="clr" in2="blr" operator="in" result="halo"/>
      <feMerge><feMergeNode in="halo"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Top-to-bottom gradient on white letterform for subtle depth -->
    <linearGradient id="g-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#D8D8D8"/>
    </linearGradient>

    <!-- Top-to-bottom gradient on red letterforms -->
    <linearGradient id="g-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2028"/>
      <stop offset="50%" stop-color="#E50914"/>
      <stop offset="100%" stop-color="#B0060F"/>
    </linearGradient>

  </defs>

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  bMOVIES  —  Netflix-style logo                                  ║
  ║                                                                  ║
  ║  Design language:                                                ║
  ║  • Tightly condensed, heavy uppercase-style weight               ║
  ║  • Stem width ~14px at 88px cap height                           ║
  ║  • Consistent open apertures (Netflix DNA)                       ║
  ║  • All path coordinates carefully tuned                          ║
  ║                                                                  ║
  ║  "b" = white  (#FFFFFF + gradient)                               ║
  ║  "Movies" = red  (#E50914 + gradient)                            ║
  ║                                                                  ║
  ║  Baseline at Y=88, cap-height Y=6                                ║
  ║  Left margin X=10                                                ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->

  <!-- ───────────────────────────────── b ──────────────────────────── -->
  <!--
    b = straight vertical stem + right-facing bowl (lower half only)
    Netflix's N/E/T/F/L/I/X have ~14px strokes at this scale.
    Stem: x=10..24, y=6..88  (height 82)
    Bowl outer: circle cx=59 cy=63 r=25 (approx)
    Bowl inner: circle cx=59 cy=63 r=12
    Stem connects to bowl at y≈38 (bowl midpoint)
  -->
  <g filter="url(#glow-white)">
    <path
      fill="url(#g-white)"
      filter="url(#shadow3d)"
      d="
        M 10,6
        L 24,6
        L 24,41
        C 29,35 38,30 52,30
        C 72,30 88,45 88,63
        C 88,81 72,96 52,96
        C 38,96 29,91 24,85
        L 24,96
        L 10,96
        Z
        M 24,63
        C 24,73 37,83 51,83
        C 65,83 74,74 74,63
        C 74,52 65,43 51,43
        C 37,43 24,53 24,63
        Z
      "
    />
  </g>

  <!-- ───────────────────────────── M ──────────────────────────────── -->
  <!--
    M: two outer uprights, two diagonals meeting at apex
    Width: ~54px   x start: 98   x end: 152
    Outer stems 13px wide.  Inner cut angle ~55°
    Apex at x=125, y=24 (inside V notch goes to y=54)
  -->
  <g filter="url(#glow-red)">
    <path
      fill="url(#g-red)"
      filter="url(#shadow3d)"
      d="
        M 98,96
        L 98,30
        L 112,30
        L 125,64
        L 138,30
        L 152,30
        L 152,96
        L 138,96
        L 138,54
        L 127,82
        L 123,82
        L 112,54
        L 112,96
        Z
      "
    />
  </g>

  <!-- ───────────────────────────── o ──────────────────────────────── -->
  <!--
    o: oval with uniform stroke ~11px
    outer: cx=175 cy=64 rx=22 ry=33
    inner: cx=175 cy=64 rx=11 ry=22
  -->
  <g filter="url(#glow-red)">
    <path
      fill="url(#g-red)"
      filter="url(#shadow3d)"
      fill-rule="evenodd"
      d="
        M 153,64
        C 153,45 163,31 175,31
        C 187,31 197,45 197,64
        C 197,83 187,97 175,97
        C 163,97 153,83 153,64
        Z
        M 164,64
        C 164,76 169,86 175,86
        C 181,86 186,76 186,64
        C 186,52 181,42 175,42
        C 169,42 164,52 164,64
        Z
      "
    />
  </g>

  <!-- ───────────────────────────── v ──────────────────────────────── -->
  <!--
    v: two diagonals meeting at bottom-centre
    x range: 201..241  width 40  baseline Y=96
    apex at x=221 y=96
    Left arm: (201,31) -> (214,31) -> (225,80) -> (221,96) -> (217,80) -> left
    Right arm symmetric
    Stroke ~12 at top, taper
  -->
  <g filter="url(#glow-red)">
    <path
      fill="url(#g-red)"
      filter="url(#shadow3d)"
      d="
        M 201,31
        L 214,31
        L 221,76
        L 228,31
        L 241,31
        L 226,96
        L 216,96
        Z
      "
    />
  </g>

  <!-- ───────────────────────────── i ──────────────────────────────── -->
  <!--
    i: stem x=249..261 y=31..96 + round dot above
    Dot: cx=255 cy=22 r=7
  -->
  <g filter="url(#glow-red)">
    <!-- dot -->
    <circle cx="255" cy="21" r="7" fill="url(#g-red)" filter="url(#shadow3d)"/>
    <!-- stem -->
    <rect x="249" y="31" width="12" height="65" rx="1" fill="url(#g-red)" filter="url(#shadow3d)"/>
  </g>

  <!-- ───────────────────────────── e ──────────────────────────────── -->
  <!--
    e: open bowl, mid-crossbar, open aperture on right
    outer rx=22 ry=33 cx=290 cy=64
    crossbar at y=62..70
    Right opening: y from 55 to 73 is open
  -->
  <g filter="url(#glow-red)">
    <path
      fill="url(#g-red)"
      filter="url(#shadow3d)"
      d="
        M 268,64
        C 268,45 278,31 290,31
        C 302,31 312,44 312,60
        L 312,70
        L 279,70
        C 280,80 285,86 290,86
        C 295,86 299,82 301,76
        L 312,78
        C 309,89 300,97 290,97
        C 278,97 268,83 268,64
        Z
        M 279,61
        L 301,61
        C 300,51 296,42 290,42
        C 284,42 280,50 279,61
        Z
      "
    />
  </g>

  <!-- ───────────────────────────── s ──────────────────────────────── -->
  <!--
    s: top arc curving right, bottom arc curving left, connecting via diagonal mid-stroke
    x range 317..363
    Top arc center ~(346,44) r=16
    Bottom arc center ~(334,80) r=16
  -->
  <g filter="url(#glow-red)">
    <path
      fill="url(#g-red)"
      filter="url(#shadow3d)"
      d="
        M 320,83
        L 326,74
        C 330,80 336,86 344,86
        C 351,86 356,82 356,77
        C 356,72 352,69 344,67
        L 337,64
        C 327,61 320,55 320,47
        C 320,37 329,31 340,31
        C 349,31 355,35 359,41
        L 353,49
        C 349,44 345,41 340,41
        C 334,41 331,44 331,48
        C 331,52 334,55 341,57
        L 348,60
        C 358,63 363,70 363,78
        C 363,89 354,97 342,97
        C 333,97 325,92 320,83
        Z
      "
    />
  </g>

  <!-- ═══════════════ BOTTOM ACCENT BAR — Netflix signature ═══════ -->
  <!--
    Thin red rule spanning full logo width, 3px tall, slightly transparent
    Creates a "stage floor" cinematic grounding
  -->
  <rect x="10" y="100" width="353" height="3" rx="1.5" fill="#E50914" opacity="0.80"/>
  </g>

  <!-- Three-line strapline. xml:space="preserve" keeps the trailing
       space inside the white "SHARES " tspan so it doesn't butt up
       against the red "TO FINANCE IT". -->
  <g font-family="Bebas Neue, Impact, &apos;Helvetica Neue Condensed Black&apos;, &apos;Arial Black&apos;, sans-serif" font-weight="900" font-size="44"
     text-anchor="middle" fill="#FFFFFF">
    <text x="600" y="395">COMMISSION YOUR MOVIE.</text>

    <text x="600" y="451" xml:space="preserve">SELL ROYALTY SHARES <tspan fill="#E50914">TO FINANCE IT</tspan>.</text>

    <text x="600" y="507">EARN FROM EVERY TICKET SOLD.</text>
  </g>

  <!-- Bottom red rule, echoing the logo's accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#E50914" opacity="0.9"/>
</svg>
