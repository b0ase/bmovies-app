<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bMovies — Opening your studio</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="/account">
  <meta http-equiv="refresh" content="0; url=/account">
  <style>
    body { background:#000; color:#e5e5e5; font-family:-apple-system,sans-serif; min-height:100vh; margin:0; display:flex; align-items:center; justify-content:center; }
    .box { text-align:center; max-width:480px; padding:2rem; }
    h1 { font-size:1.25rem; font-weight:900; letter-spacing:0.02em; text-transform:uppercase; margin:0 0 0.5rem; }
    p { font-size:0.85rem; color:#888; line-height:1.5; margin:0 0 1rem; }
    a { color:#E50914; font-weight:700; text-decoration:none; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <main class="box">
    <h1>Opening your studio</h1>
    <p>Redirecting you to your account&hellip;</p>
    <p><a id="manual" href="/account">Continue to /account &rarr;</a></p>
  </main>
  <script>
    // Preserve query string + hash so deep links like ?tab=kyc
    // land on the right tab of the Next.js account route.
    (function () {
      var target = '/account' + (window.location.search || '') + (window.location.hash || '');
      var manual = document.getElementById('manual');
      if (manual) manual.href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
