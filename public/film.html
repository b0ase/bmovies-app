<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="js/session-sanitizer.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bMovies — Film</title>
  <meta name="description" content="Watch an AI-produced film on bMovies." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta property="og:type" content="video.movie" />
  <meta property="og:title" content="bMovies — Film" />
  <meta property="og:description" content="AI-produced film on bMovies." />
  <meta property="og:image" content="https://bmovies.online/bmovies_og.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #000; color: #e5e5e5; min-height: 100vh; }

    .film-hero {
      position: relative;
      /* Capped so the hero doesn't eat multiple screens — a common
         regression when the background storyboard frame is tall.
         Min bumped so the larger 360px desktop poster (540px tall)
         fits without being clipped. */
      min-height: 620px;
      max-height: min(80vh, 820px);
      background: #000; overflow: hidden;
    }
    .film-hero .bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: brightness(0.35);
    }
    /* Optional motion backdrop — a muted looping clip plays behind
       the hero copy when the offer has video artifacts. Cross-fades
       between clips so the whole trailer shows in the background,
       not just the opening shot. */
    .film-hero .bg-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      filter: brightness(0.28) saturate(1.05);
      opacity: 0;
      transition: opacity 1s ease;
    }
    .film-hero .bg-video.active { opacity: 1; }
    .film-hero .vignette {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.95) 100%);
    }
    .film-hero .content {
      position: relative; z-index: 2; max-width: 1200px;
      margin: 0 auto; padding: 5rem 3rem 4rem;
      display: flex; gap: 3rem; align-items: flex-end;
    }
    .film-hero .poster {
      width: 360px; flex-shrink: 0; aspect-ratio: 2/3;
      background: #111; border: 2px solid #222;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .film-hero .poster img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .film-hero .info { flex: 1; }
    .film-hero .kicker {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #E50914; font-weight: 700;
    }
    .film-hero h1 {
      font-family: 'Bebas Neue', 'Oswald', sans-serif;
      font-size: 5rem; color: #fff; letter-spacing: 0.02em;
      line-height: 1; margin-top: 0.5rem;
    }
    .film-hero .tagline {
      font-size: 1.2rem; color: #ccc; line-height: 1.5;
      margin-top: 1rem; max-width: 620px;
    }
    .film-hero .meta {
      display: flex; gap: 1.5rem; margin-top: 1.5rem;
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #888;
    }
    .film-hero .meta strong { color: #E50914; }
    .film-hero .cta-row {
      display: flex; gap: 0.8rem; margin-top: 2rem;
    }

    /* Three-tier button row — arguably the most important CTAs on the
       site: every path a visitor has to upgrading a pitch passes
       through these six buttons (three Make + three Fund). Sized big
       enough to read and tap on mobile, not the 0.6rem micro-text they
       were before. */
    .tier-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem; margin-top: 1.5rem;
      max-width: 720px;
    }
    .tier-btn {
      padding: 1.1rem 0.8rem; font-family: inherit;
      font-size: 0.88rem; font-weight: 900; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
      border: 1px solid #333; color: #ddd;
      transition: all 0.2s;
      line-height: 1.1;
    }
    .tier-btn:not(:disabled):hover {
      background: rgba(229, 9, 20, 0.2);
      border-color: #E50914;
      color: #fff;
    }
    .tier-btn.current {
      background: #E50914 !important; border-color: #E50914;
      color: #fff; cursor: default;
    }
    .tier-btn.included {
      background: rgba(107, 255, 138, 0.1); border-color: #2a4a33;
      color: #6bff8a; cursor: default;
    }
    .tier-btn.upgrade {
      border-color: #E50914; color: #E50914;
    }
    @media (max-width: 720px) {
      .tier-row { grid-template-columns: 1fr; max-width: none; }
    }

    /* Fund sub-row — the BSV-funding alternative that lives under the
       Make row. Slightly slimmer than .tier-btn so the Make row keeps
       visual primacy, but still big enough to read at arm's length. */
    .fund-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem; margin-top: 0.5rem;
      max-width: 720px;
    }
    .fund-btn {
      padding: 0.85rem 0.7rem; font-family: inherit;
      font-size: 0.78rem; font-weight: 900; letter-spacing: 0.06em;
      text-transform: uppercase;
      background: transparent; color: #ccc;
      border: 1px solid #2a1414;
      text-align: center; text-decoration: none;
      transition: all 0.2s;
      line-height: 1.1;
    }
    .fund-btn:hover {
      border-color: #E50914; color: #E50914;
      background: rgba(229, 9, 20, 0.06);
    }
    .fund-btn.placeholder {
      visibility: hidden;
    }
    @media (max-width: 720px) {
      .fund-row { grid-template-columns: 1fr; max-width: none; }
      .fund-btn.placeholder { display: none; }
    }
    .film-hero .cta {
      padding: 1rem 2rem; font-size: 0.8rem; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; border: 1px solid #fff; color: #fff;
      cursor: pointer;
    }
    .film-hero .cta.primary {
      background: #E50914; border-color: #E50914;
    }
    .film-hero .cta.primary:hover { background: #c4070f; }
    .film-hero .cta:hover { background: rgba(255,255,255,0.1); }
    .film-hero .cta.primary:hover { background: #c4070f; }

    main { max-width: 1200px; margin: 0 auto; padding: 3rem; }

    .section { margin-top: 3rem; }
    .section h2 {
      font-size: 1.6rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: -0.02em; color: #fff; margin-bottom: 1.5rem;
    }

    /* Cast grid */
    .crew-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .crew-member {
      border: 1px solid #222; background: #0a0a0a;
      padding: 0; overflow: hidden;
    }
    .crew-member .photo {
      width: 100%; aspect-ratio: 1; background: #111; overflow: hidden;
    }
    .crew-member .photo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .crew-member .body { padding: 0.8rem; }
    .crew-member .role {
      font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #E50914; font-weight: 700;
    }
    .crew-member .name {
      font-size: 0.85rem; font-weight: 900; color: #fff;
      margin-top: 0.25rem; line-height: 1.2;
    }
    .crew-member .studio {
      font-size: 0.55rem; color: #555; margin-top: 0.2rem;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* Trailer / preview block */
    .preview-block {
      border: 1px solid #222; background: #0a0a0a; padding: 2rem;
      font-size: 1rem; line-height: 1.7; color: #ccc;
      max-width: 820px;
    }
    .preview-block .first-line {
      font-size: 1.3rem; color: #fff; font-weight: 700;
      display: block; margin-bottom: 1rem;
    }
    .preview-block.locked {
      position: relative;
    }
    .preview-block.locked::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 60%;
      background: linear-gradient(transparent, #0a0a0a);
      pointer-events: none;
    }

    /* Synopsis */
    .synopsis {
      font-size: 1.05rem; line-height: 1.7; color: #ccc;
      max-width: 820px;
    }

    /* Trailer presentation — centred cinema-frame player with a
       filmstrip of thumbs beneath. Previously the section rendered
       left-aligned inside main's 1200px container with max-width 848,
       which left a big empty gutter on the right and made the trailer
       look orphaned. */
    .trailer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .trailer-head {
      max-width: 900px;
      margin: 0 auto 1.2rem;
    }
    .trailer-head .eyebrow {
      font-size: 0.6rem;
      color: #E50914;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .trailer-head h2 {
      margin: 0 0 0.5rem;
    }
    .trailer-head .trailer-sub {
      color: #888;
      font-size: 0.85rem;
      line-height: 1.5;
      max-width: 620px;
      margin: 0 auto;
    }
    .trailer-player {
      position: relative;
      width: 100%;
      max-width: 1040px;
      background: #000;
      border: 1px solid #222;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
    .trailer-player video {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      display: block;
      background: #000;
      transition: opacity 0.3s ease;
    }
    .trailer-counter {
      position: absolute;
      top: 0.7rem;
      right: 0.9rem;
      background: rgba(0, 0, 0, 0.75);
      padding: 0.3rem 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: #fff;
      letter-spacing: 0.08em;
      pointer-events: none;
    }
    .trailer-strip {
      width: 100%;
      max-width: 1040px;
      margin: 1rem auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.5rem;
    }
    .trailer-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      padding: 0;
      overflow: hidden;
      background: #0a0a0a;
      border: 1px solid #222;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .trailer-thumb:hover { border-color: #444; transform: translateY(-2px); }
    .trailer-thumb.active {
      border-color: #E50914;
      background: #1a0003;
    }
    .trailer-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .trailer-thumb-label {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 0.35rem 0.6rem;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: left;
    }

    /* ─── Post-production: title-card overlays + sound toggle ─── */
    .trailer-player { position: relative; }
    .trailer-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 3;
    }
    .trailer-card {
      position: absolute;
      opacity: 0;
      transition: opacity 0.4s ease;
      padding: 1.2rem 1.8rem;
      text-align: center;
      max-width: 90%;
      color: #fff;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.9);
    }
    .trailer-card.visible { opacity: 1; }
    .trailer-card.studio {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #fff;
      bottom: 12%;
    }
    .trailer-card.tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      line-height: 1.15;
      letter-spacing: 0.04em;
      font-style: italic;
      font-weight: 400;
    }
    .trailer-card.cast {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 2.6vw, 1.8rem);
      letter-spacing: 0.06em;
      bottom: 20%;
    }
    .trailer-card.cast .subtitle {
      display: block;
      font-size: 0.55em;
      letter-spacing: 0.22em;
      color: #E50914;
      margin-bottom: 0.4rem;
    }
    .trailer-card.title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 8vw, 6rem);
      letter-spacing: 0.03em;
      font-weight: 900;
      line-height: 0.95;
      text-transform: uppercase;
    }
    .trailer-card.title .ticker {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.2em;
      color: #E50914;
      margin-top: 0.8rem;
      letter-spacing: 0.3em;
    }
    /* Fade tint over the video the instant a title card appears so it
       reads cleanly even on bright clips. */
    .trailer-overlay .tint {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 75%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .trailer-overlay.has-card .tint { opacity: 1; }

    /* Sound toggle pill — floats over the player.
       Starts LARGE + CENTRED over the video when audio is available
       but autoplay-blocked, so users can't miss the "click for sound"
       affordance. After the first click it shrinks to a small pill
       in the bottom-left so it stops covering the picture. */
    .trailer-sound-toggle {
      position: absolute;
      bottom: 0.8rem;
      left: 0.9rem;
      z-index: 4;
      padding: 0.4rem 0.7rem;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.25s ease;
    }
    .trailer-sound-toggle:hover { background: rgba(229, 9, 20, 0.85); border-color: #E50914; }
    .trailer-sound-toggle.on    { background: rgba(229, 9, 20, 0.85); border-color: #E50914; }

    /* Big PLAY TRAILER button that owns the first-frame view of the
       trailer-player. Nothing plays until the user taps it — video,
       music, and VO all start synchronously when it's clicked, which
       is the only reliable way to get sound through browser autoplay
       policies. After the trailer finishes playing through, the same
       button reappears as a ↻ REPLAY. */
    .trailer-play-gate {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      cursor: pointer;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .trailer-play-gate.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .trailer-play-gate .play-button {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 1.2rem 2.4rem;
      background: #E50914;
      color: #fff;
      border: 2px solid #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.85),
                  0 0 0 0 rgba(229, 9, 20, 0.6);
      animation: trailer-play-pulse 2.2s ease-in-out infinite;
      transition: transform 0.15s ease;
    }
    .trailer-play-gate .play-button:hover { transform: scale(1.04); }
    .trailer-play-gate .play-button .glyph {
      font-size: 1.4em;
      line-height: 0.8;
      margin-top: -0.1em;
    }
    @keyframes trailer-play-pulse {
      0%, 100% { box-shadow: 0 16px 60px rgba(0, 0, 0, 0.85), 0 0 0 0 rgba(229, 9, 20, 0.55); }
      50%      { box-shadow: 0 16px 60px rgba(0, 0, 0, 0.85), 0 0 0 24px rgba(229, 9, 20, 0); }
    }
    .trailer-play-gate .hint {
      position: absolute;
      bottom: 1.2rem;
      left: 0; right: 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
    }
    .trailer-sound-toggle.prompt {
      top: 50%; left: 50%; bottom: auto;
      transform: translate(-50%, -50%);
      padding: 1rem 1.6rem;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      background: rgba(229, 9, 20, 0.92);
      border: 2px solid #fff;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
      animation: trailer-sound-pulse 1.6s ease-in-out infinite;
    }
    .trailer-sound-toggle.prompt:hover { background: #E50914; }
    @keyframes trailer-sound-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -50%) scale(1.06); }
    }

    /* Studio card */
    .studio-card {
      border: 1px solid #222; background: #0a0a0a; padding: 1.5rem;
      display: flex; gap: 1.5rem; align-items: center; max-width: 620px;
    }
    .studio-card img {
      width: 120px; height: 80px; object-fit: cover; flex-shrink: 0;
    }
    .studio-card .sc-info { flex: 1; }
    .studio-card .sc-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #fff;
      letter-spacing: 0.03em; line-height: 1;
    }
    .studio-card .sc-genre {
      font-size: 0.6rem; color: #E50914; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.3rem;
    }

    .state {
      text-align: center; padding: 6rem 0; color: #555;
    }
    .state h2 { color: #333; font-size: 2rem; }

    @media (max-width: 860px) {
      .film-hero .content { flex-direction: column; align-items: center; text-align: center; padding: 4rem 2rem 3rem; }
      .film-hero .poster { width: 260px; }
      .film-hero h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <header class="site-header"></header>

  <!-- Storyboard lightbox modal -->

    <div style="max-width:1000px;width:100%;max-height:90vh;display:flex;flex-direction:column;gap:1rem;">

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.103.0';
    import { renderCascade, WATCH_PRICE_SATS } from './js/cascade.js';
    import { openPayPicker } from './js/pay-picker.js';
    const supabase = createClient('https://api.b0ase.com',

    function decodeDataUrl(url) {
      if (!url || !url.startsWith('data:')) return null;
      try {
        const idx = url.indexOf(',');
        if (idx < 0) return null;
        return decodeURIComponent(url.slice(idx + 1));
      } catch { return null; }
    }

    const TIER_ORDER = ['trailer', 'short', 'feature'];
    const TIER_META = {
      trailer: { label: 'Trailer', price: 9.99, display: '$9.99' },

      feature: { label: 'Feature', price: 999,  display: '$999' },

    /**
     * Tier row — three buttons, one per tier (trailer / short / feature).
     *
     * Each button resolves to one of three states depending on whether
     * the tier already exists as a derivative of the current pitch:
     *
     *   - Exists  → "Watch trailer" (links to that tier's film.html)
     *   - Missing → "Make trailer · $9.99" (links to commission.html
     *               with parent_id pre-filled, so payment flows as an
     *               upgrade of this pitch)
     *   - Current → "✓ Trailer" (disabled; this IS the page you're on)
     *
     * `derivatives` is the flat list of offers where parent_offer_id
     * equals this offer's id. Same logic works whether the current page
     * is a pitch, trailer, or short — the tier-row always lists the
     * tiers ABOVE the current one.
     */
    function renderTierRow(offer, derivatives = []) {
      const currentTier = offer.tier || 'pitch';
      const byTier = {};
      for (const d of derivatives) byTier[d.tier] = d;

      // Two-row layout per unproduced tier:
      //   Row 1 (tier-row, primary) — state button:
      //     ✓ Current  |  ▶ Watch existing derivative  |  Fund TIER · BSV
      //     (BSV path routes to /offer.html — investors buy royalty
      //      shares against the parent, crowdfunding the next tier)
      //   Row 2 (fund-row, secondary) — the Stripe alternative:
      //     Fund TIER · STRIPE
      //     Routes the commissioner (or anyone willing to pay USD) to
      //     /commission.html in the parent-derived flow. The resulting
      //     offer lands in the funder's /account workbench as a draft.
      //     KYC is NOT required to commission — it's required to
      //     publish or list shares, enforced server-side on
      //     api/feature/publish + api/feature/list-shares.
      const tierTitle = encodeURIComponent(offer.title || '');
      const tierTicker = encodeURIComponent(offer.token_ticker || '');
      const tierRowButtons = TIER_ORDER.map(t => {
        const meta = TIER_META[t];
        const isCurrent = t === currentTier;
        const derivative = byTier[t];
        let state = '';
        let label = '';
        let href = '';
        let disabled = false;

        if (isCurrent) {
          state = 'current';
          label = `✓ ${meta.label}`;
          disabled = true;
        } else if (derivative) {
          state = 'included';
          label = `▶ Watch ${meta.label.toLowerCase()}`;
          href = `film.html?id=${encodeURIComponent(derivative.id)}`;
        } else {
          // Primary action: MAKE TIER via Stripe — commission a new
          // derivative owned by the funder. Routes to /commission.html
          // with the parent pre-filled so Stripe checkout fires as a
          // derivative commission. The BSV "buy shares" path moves
          // into the secondary row below.
          const price = meta.display || '';
          state = 'upgrade';
          label = `Make ${meta.label.toLowerCase()}${price ? ' · ' + price : ''}`;
          href = `commission.html?tier=${encodeURIComponent(t)}`
            + `&parentId=${encodeURIComponent(offer.id)}`
            + `&title=${tierTitle}`
            + `&ticker=${tierTicker}`;
        }

        if (href) {
          return `
            <a class="tier-btn ${state}" href="${href}" style="text-align:center;text-decoration:none;">
              ${label}
            </a>
          `;
        }
        return `
          <button class="tier-btn ${state}" data-tier="${t}" ${disabled ? 'disabled' : ''}>
            ${label}
          </button>
        `;
      }).join('');

      // Row 2 — Secondary action: BUY royalty shares in the parent
      // pitch via BSV wallet. Different path entirely from the Make
      // button above. One slot per tier that doesn't exist and
      // isn't the current page; current/existing tiers get a spacer
      // so the 3-column grid stays aligned.
      const fundRowButtons = TIER_ORDER.map(t => {
        const meta = TIER_META[t];
        const isCurrent = t === currentTier;
        const derivative = byTier[t];
        if (isCurrent || derivative) {
          return `<div class="fund-btn placeholder" aria-hidden="true"></div>`;
        }
        // ?target=<tier> hints the offer page about the tranche size
        // the commissioner is raising toward, so the default slider
        // lands in the right neighbourhood.
        const href = `offer.html?id=${encodeURIComponent(offer.id)}&target=${t}`;
        return `
          <a class="fund-btn" href="${href}">
            Buy shares (${meta.label.toLowerCase()} raise) · BSV
          </a>
        `;
      }).join('');

      return `
        <div class="tier-row">${tierRowButtons}</div>
        <div class="fund-row">${fundRowButtons}</div>
      `;
    }

    // Strip AI meta-commentary from agent outputs: "Below is...",
    // "I've adopted...", "Here's the..." etc. These leak because the
    // writer prompt wasn't strict enough. This cleans the display.
    function stripMeta(text) {
      if (!text) return text;
      // Split on double newlines, drop leading paragraphs that look
      // like meta-commentary rather than actual content.
      const metaPatterns = [
        /^below is /i,
        /^here('s| is) /i,
        /^i['’]ve adopted /i,
        /^i['’]ll /i,
        /^the treatment is /i,
        /^let me /i,
        /^this treatment /i,
      ];
      const paras = text.split(/\n\n+/);
      while (paras.length > 0) {
        const p = paras[0].trim();
        if (metaPatterns.some(re => re.test(p))) {
          paras.shift();
        } else {
          break;
        }
      }
      return paras.join('\n\n');
    }

    async function load(offerId) {
      const { data: offer, error } = await supabase
        .from('bct_offers')
        .select('id, title, synopsis, status, token_ticker, tier, commissioner_percent, trailer_video_url, parent_offer_id, bct_artifacts(id, kind, url, model, role, agent_id, prompt, step_id)')
        .eq('id', offerId)
        .maybeSingle();
      if (error) throw error;
      return offer;
    }

    async function loadAgents(agentIds) {
      if (agentIds.length === 0) return {};
      const { data } = await supabase
        .from('bct_agents')
        .select('id, name, studio, role, persona, reputation, jobs_completed')
        .in('id', agentIds);
      const map = {};
      (data || []).forEach(a => { map[a.id] = a; });
      return map;
    }

    async function loadStudioTeam(studioId) {
      if (!studioId) return [];
      const { data } = await supabase
        .from('bct_agents')
        .select('id, name, studio, role, persona, reputation, jobs_completed')
        .eq('studio', studioId);
      return data || [];
    }

    async function loadParent(parentOfferId) {
      if (!parentOfferId) return null;
      const { data } = await supabase
        .from('bct_offers')
        .select('id, title, tier, token_ticker, parent_offer_id')
        .eq('id', parentOfferId)
        .maybeSingle();
      return data || null;
    }

    async function loadDerivatives(offerId) {
      const { data } = await supabase
        .from('bct_offers')
        .select('id, title, tier, token_ticker, status')
        .eq('parent_offer_id', offerId)
        .order('id', { ascending: false });
      return data || [];
    }

    function agentImagePath(agentId, agent) {
      if (!agent) return null;
      // Files were generated as "Sound Design" not "Sound Designer" so
      // sound_designer resolves to `sound-design` without the trailing 'er'.
      let role = agent.role.replace('_', '-').toLowerCase();
      if (role === 'sound-designer') role = 'sound-design';
      const name = agent.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      return `img/studios/agents/${agent.studio}--${role}${name}.jpg`;
    }

    function render(offer) {

      const isEphemeralUrl = (u) => typeof u === 'string' && /(imgen|vidgen|videos)\.x\.ai/.test(u);
      const rawArts = offer.bct_artifacts || [];
      const arts = rawArts.filter((a) => !isEphemeralUrl(a.url));
      const posterArt = arts.find(a => a.role === 'poster' && a.kind === 'image');
      const storyboard = arts.find(a => a.role === 'storyboard' && a.kind === 'image');
      const writer = rawArts.find(a => a.role === 'writer' && a.kind === 'text');

      // Priority: POSTER_MAP override (commissioner-curated static JPG,
      // always permanent) → non-ephemeral poster artifact → non-ephemeral
      // storyboard frame. POSTER_MAP wins because anything in the DB
      // that isn't already filtered out is still a potential time-bomb
      // (e.g. an un-mirrored upstream URL we haven't seen before).
      const titleEsc = esc((offer.title || 'Untitled').slice(0, 20));
      const placeholderSvg = 'data:image/svg+xml,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600"><rect width="400" height="600" fill="#0a0a0a"/><rect width="400" height="4" fill="#E50914"/><rect y="596" width="400" height="4" fill="#E50914"/><text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="900" fill="#fff">${titleEsc}</text><text x="200" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" letter-spacing="3">GENERATING</text></svg>`

      const writerText = writer ? decodeDataUrl(writer.url) : null;
      // Always use the offer synopsis for the preview. The writer's
      // treatment is the FULL film and is gated behind the paywall.

      document.title = `bMovies — ${offer.title}`;

      const rolesDelivered = arts.filter(a => a.role).length;

          : '';

        // ─── Storyboard image gallery ───
        //
        // Every image artifact on the offer except the hero poster,
        // laid out as a responsive grid. Clicking opens the full image.
        //
        // Dedupe by URL — legacy rows share mirror filenames due to the
        // storyboard.pack step_id collision bug (multiple bct_artifacts
        // rows pointed at the same mirrored .jpg). Fixed in the generator
        // for new offers via unique storyboard.frame_<i> step_ids, but
        // existing rows remain until a cleanup migration lands. Rendering
        // through a url→artifact map collapses those to one tile each.
        const galleryImages = Array.from(
          new Map(
            arts
              .filter(a =>
                a.kind === 'image' &&
                !(a.role === 'poster' && a === posterArt) &&

        // ─── Revenue cascade visualisation ───
        //
        // Uses the existing cascade.js renderer to show the sats
        // flow when a viewer pays the $2.99 ticket. Works for any

        let cascadeSection = '';
        try {
          const cascade = renderCascade(offer, { theme: 'dark' });

        const heroVideoClips = arts.filter(a => a.kind === 'video');

        root.innerHTML = `
          <div class="film-hero">

                <div style="display:flex;gap:0.8rem;margin-top:1.2rem;flex-wrap:wrap;align-items:center;">

            ${writerText ? `

        wirePlayback(offer, arts, writerText);

        // Wire the scene reel player (auto-advance + thumb switching)
        (function wireSceneReel() {
          const playlist = window._filmSceneClips || [];
          if (playlist.length === 0) return;
          const player = document.getElementById('film-scene-player');
          const idxEl = document.getElementById('film-scene-idx');
          const thumbs = document.querySelectorAll('.film-scene-thumb');
          if (!player || !idxEl) return;
          let current = 0;
          function load(i) {
            if (i < 0 || i >= playlist.length) return;
            current = i;
            player.src = playlist[i].url;
            player.play().catch(() => {});
            idxEl.textContent = String(i + 1);
            thumbs.forEach((b, j) => {
              b.style.background = j === i ? '#e50914' : '#1a1a1a';
              b.style.borderColor = j === i ? '#e50914' : '#2a2a2a';
              b.style.color = j === i ? '#fff' : '#aaa';
            });
          }
          player.addEventListener('ended', () => {
            if (current + 1 < playlist.length) load(current + 1);
          });
          thumbs.forEach((b, j) => b.addEventListener('click', () => load(j)));
        })();

        // Tier-upgrade buttons are now plain <a href> links to
        // offer.html (BSV-wallet funding flow); no JS hijack needed.
        // The previous Stripe /api/checkout hijack is removed — the
        // commissioner-specific upgrade path lives on /account.
      });
    }

    // ─── Playback / paywall ───
    function getUnlock(offerId) {
      try {
        const raw = localStorage.getItem('bmovies_unlocks');
        if (!raw) return null;
        const map = JSON.parse(raw);
        return map[offerId] || null;
      } catch { return null; }
    }
    function setUnlock(offerId, payload) {
      try {
        const raw = localStorage.getItem('bmovies_unlocks');
        const map = raw ? JSON.parse(raw) : {};
        map[offerId] = payload;
        localStorage.setItem('bmovies_unlocks', JSON.stringify(map));
      } catch {}
    }

    function wirePlayback(offer, arts, writerText) {
      const btn = document.getElementById('btn-watch');
      const status = document.getElementById('buy-status');

      // Nothing to watch? Hide the button. A pitch-tier offer is
      // just a logline + synopsis + poster — no video exists, no
      // paywall applies. A short/feature whose video-gen hasn't
      // finished yet falls into the same bucket. Offering "Watch
      // now" in either case sends a $2.99 paywall at a film that
      // doesn't exist.
      const hasVideo = (arts || []).some(a => a.kind === 'video');
      if (offer.tier === 'pitch' || !hasVideo) {
        btn.style.display = 'none';
        return;
      }

      // Trailer-tier films are free to watch — the trailer IS the
      // product. Short/feature tiers use the paywall.
      // When the media is already playing inline, the button just says
      // "Watching" which is redundant — hide it instead.
      if (offer.tier === 'trailer') {
        showFullPlayback(offer, arts, writerText);
        btn.style.display = 'none';
        return;
      }

      // Check if this film was unlocked previously, or if we just came back from Stripe
      const params = new URLSearchParams(window.location.search);
      const justPaid = params.get('ticket') === 'paid';
      const cached = getUnlock(offer.id);

      if (justPaid || cached) {
        if (!cached) setUnlock(offer.id, { ts: Date.now(), provider: 'stripe' });
        showFullPlayback(offer, arts, writerText);
        btn.style.display = 'none';
        return;
      }

      btn.addEventListener('click', async () => {
        status.textContent = '';
        const result = await openPayPicker({
          type: 'ticket',
          offerId: offer.id,
          title: offer.title,
          priceUsd: 2.99,
        });
        if (result.cancelled) {
          status.textContent = '';
        }
      });
    }

    function showFullPlayback(offer, arts, writerText) {
      const previewSection = document.getElementById('preview-section');
      if (previewSection) previewSection.style.display = 'none';

      const byRole = {};
      arts.forEach(a => { if (a.role) byRole[a.role] = a; });

      const director = byRole['director'];
      const composer = byRole['composer'];
      const editor = byRole['editor'];
      const soundDesigner = byRole['sound_designer'];

      const directorText = stripMeta(director ? decodeDataUrl(director.url) : null);
      const editorText = stripMeta(editor ? decodeDataUrl(editor.url) : null);
      const soundText = stripMeta(soundDesigner ? decodeDataUrl(soundDesigner.url) : null);
      const cleanedWriterText = stripMeta(writerText);

      // Collect ALL video clips and storyboard frames (trailers have
      // multiple of each, not just one)
      const videoClips = arts.filter(a => a.kind === 'video');
      // Dedupe by URL — see storyboard gallery above for rationale.
      const storyboardFrames = Array.from(
        new Map(
          arts
            .filter(a => a.role === 'storyboard' && a.kind === 'image')
            .map(a => [a.url, a])
        ).values()
      );

      // Store video URLs for the sequential player wired below
      window._trailerClips = videoClips.map(v => v.url);

      const html = `
        ${videoClips.length > 0 ? `
          <div class="section trailer-section">
            <div class="trailer-head">
              <div class="eyebrow">A bMovies production${videoClips.length > 1 ? ' · ' + videoClips.length + ' clips' : ''}</div>
              <h2>The trailer</h2>
              ${videoClips.length > 1 ? `<p class="trailer-sub">Plays through every clip back-to-back. Tap a thumbnail to jump to a specific shot.</p>` : ''}
            </div>
            <div class="trailer-player">
              <!-- No autoplay: the PLAY gate below takes the user's
                   gesture and starts video + music + VO in lockstep,
                   which is the only way to get audio through browser
                   autoplay policies reliably. preload=metadata paints
                   the first frame so the gate doesn't sit on black. -->
              <video muted playsinline
                id="main-video"
                preload="metadata"
                src="${esc(videoClips[0].url)}"></video>
              <div class="trailer-overlay" id="trailer-overlay">
                <div class="tint"></div>
              </div>
              <!-- PLAY / REPLAY gate -->
              <div class="trailer-play-gate" id="trailer-play-gate" role="button" tabindex="0" aria-label="Play trailer">
                <button type="button" class="play-button" id="trailer-play-button">
                  <span class="glyph">▶</span>
                  <span id="trailer-play-label">Play trailer</span>
                </button>
                <div class="hint" id="trailer-play-hint">
                  ~32s · sound on · plays once
                </div>
              </div>
              <button type="button" class="trailer-sound-toggle" id="trailer-sound-toggle" aria-label="Toggle trailer audio" style="display:none;">
                <span id="trailer-sound-icon">🔊</span>
                <span id="trailer-sound-label">Sound on</span>
              </button>
              ${videoClips.length > 1 ? `
                <div id="main-video-counter" class="trailer-counter">
                  Clip <span id="main-video-idx">1</span> / ${videoClips.length}
                </div>
              ` : ''}
              <!-- Music bed + voiceover tracks. Hidden controls; routed
                   through the main-video mute toggle so users can't get
                   music without visuals or vice-versa. -->
              <audio id="trailer-music" preload="auto" loop></audio>
              <audio id="trailer-vo"    preload="auto"></audio>
            </div>
            ${videoClips.length > 1 ? `
              <div id="main-video-thumbs" class="trailer-strip">
                ${videoClips.map((v, i) => `
                  <button data-clip-idx="${i}" class="trailer-thumb${i === 0 ? ' active' : ''}">
                    <video src="${esc(v.url)}" muted preload="metadata"></video>
                    <div class="trailer-thumb-label">Clip ${String(i + 1).padStart(2, '0')}</div>
                  </button>
                `).join('')}
              </div>
            ` : ''}
          </div>
        ` : ''}

        ${cleanedWriterText ? `
          <div class="section">
            <h2>Treatment</h2>

            </div>
            <a href="deck.html?id=${encodeURIComponent(offer.id)}" style="display:inline-block;margin-top:1.2rem;padding:0.7rem 1.4rem;border:1px solid #E50914;color:#E50914;text-decoration:none;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">
              Read full treatment →
            </a>
          </div>

        ${storyboardFrames.length > 0 ? `
          <div class="section">

            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.8rem;max-width:960px;">
              ${storyboardFrames.map((f, i) => `
                <button
                  onclick="window.openStoryboardModal(${i})"
                  style="border:1px solid #222;background:#0a0a0a;overflow:hidden;padding:0;cursor:pointer;font-family:inherit;text-align:left;display:block;"
                  onmouseover="this.style.borderColor='#E50914'"
                  onmouseout="this.style.borderColor='#222'">
                  <img src="${esc(f.url)}" alt="Frame ${i + 1}" loading="lazy" style="width:100%;height:auto;display:block;" />
                  <div style="padding:0.5rem 0.8rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Frame ${String(i + 1).padStart(2, '0')} — click to expand</div>
                </button>
              `).join('')}
            </div>
          </div>
        ` : ''}

        ${composer ? `
          <div class="section">
            <h2>The score</h2>
            <audio controls preload="none" src="${esc(composer.url)}" style="width:100%;max-width:620px;filter:invert(1) hue-rotate(180deg);"></audio>
          </div>
        ` : ''}

        ${(directorText || editorText || soundText) ? `
          <div class="section">
            <h2>Production notes</h2>
            <p style="color:#888;font-size:0.85rem;max-width:620px;">
              Director's vision, editing plan, and sound design are in the investor pack.
            </p>
            <a href="deck.html?id=${encodeURIComponent(offer.id)}" style="display:inline-block;margin-top:0.8rem;padding:0.7rem 1.4rem;border:1px solid #333;color:#ccc;text-decoration:none;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">
              View investor pack →
            </a>
          </div>
        ` : ''}
      `;

      const target = document.getElementById('full-playback');
      target.innerHTML = html;
      target.style.display = 'block';

      // Wire sequential video playback — plays through all clips in
      // order, fading between them, and STOPS after the final clip
      // (the PLAY gate then reappears as a REPLAY button so the user
      // can watch again deliberately).
      (function wireSequentialPlayer() {
        const clips = window._trailerClips || [];
        if (clips.length < 2) return;  // single clip plays fine on its own
        const player = document.getElementById('main-video');
        const idxEl = document.getElementById('main-video-idx');
        const thumbContainer = document.getElementById('main-video-thumbs');
        if (!player) return;
        let current = 0;

        function highlightThumb(idx) {
          if (!thumbContainer) return;
          thumbContainer.querySelectorAll('button[data-clip-idx]').forEach((btn, j) => {
            btn.classList.toggle('active', j === idx);
          });
        }

        function loadClip(idx, { autoplay = true } = {}) {
          current = idx;
          player.style.opacity = '0';
          setTimeout(() => {
            player.src = clips[idx];
            if (autoplay) player.play().catch(() => {});
            if (idxEl) idxEl.textContent = String(idx + 1);
            highlightThumb(idx);
            player.style.opacity = '1';
          }, 300);
        }

        player.addEventListener('ended', () => {
          if (current < clips.length - 1) {
            loadClip(current + 1);
          } else {
            // Final clip finished. Stop playback, show the REPLAY gate,
            // and let wireCompositor's "onTrailerStop" hook pause music
            // and VO so the page goes clean-silent instead of holding
            // on a paused-with-music state.
            player.pause();
            window._onTrailerStop?.();
          }
        });

        if (thumbContainer) {
          thumbContainer.querySelectorAll('button[data-clip-idx]').forEach(btn => {
            btn.addEventListener('click', () => {
              const idx = parseInt(btn.getAttribute('data-clip-idx'), 10);
              if (!isNaN(idx) && idx >= 0 && idx < clips.length) loadClip(idx);
            });
          });
        }

        // Expose loadClip so the compositor can reset to clip 0 when
        // the PLAY gate is pressed (or the user hits REPLAY).
        window._trailerLoadClip = loadClip;

        // Synchronous reset — no fade, no setTimeout, no closure-
        // breaking. The PLAY gate calls this so its subsequent
        // player.play() fires inside the same user-gesture window
        // (critical for browser autoplay-with-sound to not reject).
        window._trailerReset = () => {
          current = 0;
          if (clips[0]) player.src = clips[0];
          player.style.opacity = '1';
          if (idxEl) idxEl.textContent = '1';
          highlightThumb(0);
        };
      })();

      // ─── Post-production compositor ───
      //
      // Takes the raw 4-clip reel and layers on top:
      //   • title cards (from editor.trailer_titles JSON)
      //   • music bed  (from composer.trailer_score — audio artifact)
      //   • voiceover   (from vo.trailer_narration — audio artifact)
      //
      // Runs independently of the sequential clip player above so
      // either can ship without the other. If no compositor data is
      // attached to the offer, this block is a no-op.
      (function wireCompositor() {
        const player = document.getElementById('main-video');
        const overlay = document.getElementById('trailer-overlay');
        const musicEl = document.getElementById('trailer-music');
        const voEl    = document.getElementById('trailer-vo');
        const soundBtn = document.getElementById('trailer-sound-toggle');
        if (!player || !overlay) return;

        // Pull the compositor artifacts from the offer's artifact set.
        const titlesArt = arts.find(a => a.role === 'editor' && (a.step_id || '').endsWith('trailer_titles'));
        const musicArt  = arts.find(a => a.role === 'composer' && a.kind === 'audio');
        const voArt     = arts.find(a => a.role === 'vo' && a.kind === 'audio');

        // Parse titles JSON. Accept data: URLs (the endpoint writes
        // these) or remote URLs.
        let timeline = null;
        if (titlesArt?.url) {
          try {
            if (titlesArt.url.startsWith('data:')) {
              const decoded = decodeDataUrl(titlesArt.url);
              if (decoded) timeline = JSON.parse(decoded);
            } else {
              // Remote URL — fire-and-forget; apply when it lands.
              fetch(titlesArt.url).then(r => r.ok ? r.json() : null).then(j => {
                if (j?.cards) { timeline = j; renderCards(); }
              }).catch(() => {});
            }
          } catch (err) { console.warn('[compositor] bad titles JSON', err); }
        }

        // Always add a minimal fallback so the final title card at least
        // reveals the film's name even when Grok's titles-pass failed.
        if (!timeline) {
          const fallbackEnd = Math.max(24, (player.duration || 32) - 4);
          timeline = {
            duration: 32,
            cards: [
              { text: 'A bMovies production', startAt: 0.5, duration: 2.5, style: 'studio' },
              { text: (offer.title || 'Untitled').toUpperCase(), startAt: fallbackEnd, duration: 6, style: 'title' },
            ],
          };
        }

        // Render the cards once up-front; show/hide by visibility class.
        function renderCards() {
          if (!overlay || !timeline?.cards) return;
          overlay.querySelectorAll('.trailer-card').forEach(n => n.remove());
          timeline.cards.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `trailer-card ${card.style || 'tagline'}`;
            div.dataset.cardIdx = String(i);
            if (card.style === 'title') {
              const tickerHtml = offer.token_ticker
                ? `<span class="ticker">$${esc(offer.token_ticker)}</span>`
                : '';
              div.innerHTML = esc(card.text) + tickerHtml;
            } else if (card.style === 'cast' && card.subtitle) {
              div.innerHTML = `<span class="subtitle">${esc(card.subtitle)}</span>${esc(card.text)}`;
            } else {
              div.textContent = card.text;
            }
            overlay.appendChild(div);
          });
        }
        renderCards();

        // Wire music + VO audio sources. Grok's video clips carry
        // their own ambient audio which clashes with the music bed
        // and voiceover, so the <video> element is held permanently
        // muted — only the <audio> elements carry the trailer's
        // final mix.
        if (musicArt?.url) musicEl.src = musicArt.url;
        if (voArt?.url)    voEl.src    = voArt.url;

        // Force the video element muted for the lifetime of the page
        // and keep fighting it if something else (native controls,
        // browser UX, previous state) unmutes it.
        player.muted = true;
        player.volume = 0;
        player.addEventListener('volumechange', () => {
          if (!player.muted) player.muted = true;
          if (player.volume > 0) player.volume = 0;
        });
        // Hide the native mute/volume controls so users can't fight
        // with us. "controlsList" is honoured by Chromium; Firefox
        // still shows them but respects the forced-muted state.
        player.setAttribute('controlslist', 'nodownload nofullscreen noplaybackrate novolume');
        player.disablePictureInPicture = true;

        // Sound state — whether music + VO tracks are playing. The
        // video is always muted; "soundOn" only governs our audio
        // elements.
        const hasAudioTracks = !!(musicEl.src || voEl.src);
        let soundOn = false;

        function updateSoundButton() {
          // The PLAY gate is now the single audio entry point — the
          // sound pill would only be a redundant "click for sound"
          // control after the user has already clicked PLAY. Keep it
          // wired (in case we want to re-enable later) but always
          // hidden so it doesn't flash over the trailer.
          if (!soundBtn) return;
          soundBtn.classList.toggle('on', soundOn);
          soundBtn.classList.remove('prompt');
          soundBtn.style.display = 'none';
        }
        function syncSound() {
          if (musicEl) {
            musicEl.muted = !soundOn;
            musicEl.volume = soundOn ? 0.35 : 0;
            if (soundOn && musicEl.src) {
              musicEl.play().catch(() => {});
            } else {
              musicEl.pause();
            }
          }
          if (voEl) {
            voEl.muted = !soundOn;
            voEl.volume = soundOn ? 1.0 : 0;
            if (soundOn && voEl.src) {
              voEl.play().catch(() => {});
            } else {
              voEl.pause();
            }
          }
        }
        updateSoundButton();

        // ─── PLAY gate ───
        //
        // The big red PLAY button is now the single entry point for
        // the trailer: clicking it starts video + music + VO in one
        // gesture, which is the only way to get audio through browser
        // autoplay policies reliably. Nothing plays before this click.
        const playGate = document.getElementById('trailer-play-gate');
        const playBtn  = document.getElementById('trailer-play-button');
        const playLabel = document.getElementById('trailer-play-label');
        const playHint  = document.getElementById('trailer-play-hint');

        async function startTrailer() {
          // Every side-effect in this function must be SYNCHRONOUS inside
          // the click-callback window — any await before .play() will
          // cost us the user gesture and browsers will reject the audio
          // plays. So no src reassignment on first-play (which triggers
          // an async load), and reset is only done on REPLAY.
          try {
            const isReplay = player.ended || (player.duration && player.currentTime >= player.duration - 0.1);
            if (isReplay) {
              if (window._trailerReset) window._trailerReset();
              try { player.currentTime = 0; } catch {}
              if (musicEl?.src) { try { musicEl.currentTime = 0; } catch {} }
              if (voEl?.src)    { try { voEl.currentTime    = 0; } catch {} }
            }
            if (musicEl && musicEl.src) {
              musicEl.muted = false;
              musicEl.volume = 0.35;
            }
            if (voEl && voEl.src) {
              voEl.muted = false;
              voEl.volume = 1.0;
            }
            // Video always muted — Grok clips have ambient audio that
            // clashes with music + VO.
            player.muted = true;
            player.volume = 0;
            // Hide the gate BEFORE .play() resolves — the click event is
            // still in-flight so autoplay-with-sound is allowed.
            playGate?.classList.add('hidden');
            soundOn = hasAudioTracks;
            // Fire all plays synchronously inside the gesture.
            const plays = [ player.play().catch((e) => console.warn('[compositor] video play rejected', e)) ];
            if (musicEl?.src) plays.push(musicEl.play().catch(() => {}));
            if (voEl?.src)    plays.push(voEl.play().catch(() => {}));
            await Promise.allSettled(plays);
          } catch (err) {
            console.warn('[compositor] start trailer failed:', err);
          }
        }

        // When the trailer finishes its final clip, wireSequentialPlayer
        // pauses the video and calls this hook. We pause music + VO so
        // the page falls silent, then repaint the gate as a REPLAY
        // button so the viewer can rerun it.
        window._onTrailerStop = () => {
          soundOn = false;
          if (musicEl) musicEl.pause();
          if (voEl)    voEl.pause();
          if (playLabel) playLabel.textContent = 'Replay';
          if (playHint)  playHint.textContent  = 'plays once · click to watch again';
          if (playGate)  playGate.classList.remove('hidden');
        };

        playGate?.addEventListener('click', (e) => {
          e.stopPropagation();
          startTrailer();
        });
        playGate?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startTrailer(); }
        });

        // The sound pill is a secondary control — hidden by default in
        // the new PLAY-gate flow, but left wired up so power users (or
        // ambient-video contexts) can still toggle.
        soundBtn?.addEventListener('click', (e) => {
          e.stopPropagation();
          soundOn = !soundOn;
          updateSoundButton();
          syncSound();
        });

        // ─── Timeline-driven overlay loop ───
        //
        // Each video clip is ~8s. The compositor tracks GLOBAL trailer
        // time = (sum of prior clip durations) + current clip.currentTime.
        // We step through timeline.cards and flip the `visible` class on
        // their DOM nodes when the global clock crosses each card's
        // [startAt, startAt+duration] window.
        const clips = window._trailerClips || [];
        const CLIP_ESTIMATED = 8;  // fallback when metadata isn't loaded
        function currentClipIndex() {
          // Read from the counter span wired by wireSequentialPlayer.
          const el = document.getElementById('main-video-idx');
          const n = el ? Number(el.textContent || '1') : 1;
          return Math.max(0, Math.min(clips.length - 1, n - 1));
        }
        function globalTime() {
          const idx = currentClipIndex();
          const priorDuration = idx * CLIP_ESTIMATED;
          const within = Math.min(player.currentTime || 0, CLIP_ESTIMATED);
          return priorDuration + within;
        }
        function tick() {
          if (!timeline?.cards) return;
          const t = globalTime();
          let anyVisible = false;
          overlay.querySelectorAll('.trailer-card').forEach((node) => {
            const i = Number(node.dataset.cardIdx || '-1');
            const card = timeline.cards[i];
            if (!card) return;
            const vis = t >= card.startAt && t <= card.startAt + card.duration;
            node.classList.toggle('visible', vis);
            if (vis) anyVisible = true;
          });
          overlay.classList.toggle('has-card', anyVisible);
        }
        setInterval(tick, 150);
        player.addEventListener('play', () => {
          // If music/VO are armed, keep them aligned with the video's
          // global playback time.
          if (soundOn) syncSound();
        });

        // (No loop handler here — the sequential player stops after
        // clip 4 and calls window._onTrailerStop, which pauses music
        // + VO and shows the REPLAY gate above. Music and VO do not
        // loop with the video any more.)
      })();

      // ─── Hero background crossfade ───
      //
      // If the offer has video artifacts, the hero renders a single
      // <video class="bg-video"> behind the copy. This block swaps the
      // src every ~7s so the backdrop cycles through the whole trailer
      // reel rather than freezing on clip 1. Crossfade happens via
      // CSS opacity transition + a brief paired-element swap to avoid
      // the flicker you get when you reassign a playing <video>.src.
      (function wireHeroBackground() {
        const clips = window._heroBgClips || [];
        if (clips.length < 2) return;
        const el = document.getElementById('hero-bg-video');
        if (!el) return;
        el.classList.add('active');
        let i = 0;
        // Hold each clip for ~7s of visible playback; the clip itself
        // is ~8s so we swap shortly before it naturally ends.
        setInterval(() => {
          i = (i + 1) % clips.length;
          el.style.opacity = '0';
          setTimeout(() => {
            el.src = clips[i];
            el.play().catch(() => {});
            el.style.opacity = '';
          }, 450);
        }, 7000);
      })();

      // Wire storyboard modal
      window.__storyboardFrames = storyboardFrames;
      window.__storyboardIdx = 0;
    }

    window.openStoryboardModal = function(idx) {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = idx;
      const modal = document.getElementById('sb-modal');
      const img = document.getElementById('sb-modal-img');
      const desc = document.getElementById('sb-modal-desc');
      const label = document.getElementById('sb-modal-label');
      const f = frames[idx];
      img.src = f.url;
      desc.textContent = f.prompt || 'No scene description available.';
      label.textContent = `Frame ${String(idx + 1).padStart(2, '0')} of ${frames.length}`;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    window.closeStoryboardModal = function() {
      document.getElementById('sb-modal').style.display = 'none';
      document.body.style.overflow = '';
    };

    window.storyboardPrev = function() {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = (window.__storyboardIdx - 1 + frames.length) % frames.length;
      window.openStoryboardModal(window.__storyboardIdx);
    };

    window.storyboardNext = function() {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = (window.__storyboardIdx + 1) % frames.length;
      window.openStoryboardModal(window.__storyboardIdx);
    };

    // Keyboard navigation for the modal
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('sb-modal');
      if (modal.style.display !== 'flex') return;
      if (e.key === 'Escape') window.closeStoryboardModal();
      if (e.key === 'ArrowLeft') window.storyboardPrev();
      if (e.key === 'ArrowRight') window.storyboardNext();
    });

    // Click backdrop to close
    document.getElementById('sb-modal').addEventListener('click', (e) => {
      if (e.target.id === 'sb-modal') window.closeStoryboardModal();
    });

    const params = new URLSearchParams(window.location.search);
    const offerId = params.get('id');

    if (!offerId) {
      document.getElementById('root').innerHTML = '<div class="state"><h2>No film selected</h2><p><a href="watch.html" style="color:#E50914;">Browse films →</a></p></div>';
    } else {
      load(offerId).then(offer => {
        if (!offer) {
          document.getElementById('root').innerHTML = '<div class="state"><h2>Film not found</h2><p><a href="watch.html" style="color:#E50914;">Browse films →</a></p></div>';
          return;
        }
        render(offer);
      }).catch(err => {
        document.getElementById('root').innerHTML = `<div class="state"><h2>Error</h2><p>${esc(err.message || String(err))}</p></div>`;
      });
    }

    // ─── Stills lightbox ──────────────────────────────────────────
    //
    // Used by the storyboard gallery's onclick. Keeps the user inside
    // the film page (previously an <a target="_blank"> dumped them
    // into an image-only tab). Supports ←/→ navigation + Esc to close.
    (function setupLightbox() {
      let currentIdx = -1;
      let overlay = null;

      function getOverlay() {
        if (overlay) return overlay;
        overlay = document.createElement('div');
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.style.cssText =
          'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);' +
          'display:none;align-items:center;justify-content:center;padding:1.5rem;';
        overlay.innerHTML =
          '<button class="lb-close" aria-label="Close" style="position:absolute;top:1rem;right:1rem;width:2.5rem;height:2.5rem;background:rgba(0,0,0,0.6);border:1px solid #333;color:#fff;font-size:1.3rem;cursor:pointer;font-family:monospace;">×</button>' +
          '<button class="lb-prev" aria-label="Previous" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);width:3rem;height:3rem;background:rgba(0,0,0,0.6);border:1px solid #333;color:#fff;font-size:1.2rem;cursor:pointer;">◀</button>' +
          '<button class="lb-next" aria-label="Next" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);width:3rem;height:3rem;background:rgba(0,0,0,0.6);border:1px solid #333;color:#fff;font-size:1.2rem;cursor:pointer;">▶</button>' +
          '<figure class="lb-figure" style="max-width:92vw;max-height:88vh;margin:0;display:flex;flex-direction:column;align-items:center;gap:0.8rem;" onclick="event.stopPropagation();">' +
            '<img class="lb-img" alt="" style="max-width:100%;max-height:80vh;object-fit:contain;border:1px solid #222;background:#000;" />' +
            '<figcaption class="lb-caption" style="font-family:monospace;font-size:0.65rem;color:#888;letter-spacing:0.1em;text-transform:uppercase;"></figcaption>' +
          '</figure>';
        // Click overlay (outside the figure) to close.
        overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
        overlay.querySelector('.lb-close').addEventListener('click', close);
        overlay.querySelector('.lb-prev').addEventListener('click', (e) => { e.stopPropagation(); step(-1); });
        overlay.querySelector('.lb-next').addEventListener('click', (e) => { e.stopPropagation(); step(+1); });
        document.body.appendChild(overlay);
        return overlay;
      }

      function open(idx) {
        const items = window.__storyboardGallery || [];
        if (!items[idx]) return;
        currentIdx = idx;
        const o = getOverlay();
        const item = items[idx];
        o.querySelector('.lb-img').src = item.url;
        o.querySelector('.lb-img').alt = `Frame ${idx + 1}`;
        const label = 'Frame ' + (idx + 1) + ' of ' + items.length +
          (item.step_id ? '  ·  ' + item.step_id.replace('storyboard.', '') : '');
        o.querySelector('.lb-caption').textContent = label;
        o.querySelector('.lb-prev').style.visibility = idx > 0 ? 'visible' : 'hidden';
        o.querySelector('.lb-next').style.visibility = idx < items.length - 1 ? 'visible' : 'hidden';
        o.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      function close() {
        if (overlay) overlay.style.display = 'none';
        document.body.style.overflow = '';
        currentIdx = -1;
      }

      function step(delta) {
        const items = window.__storyboardGallery || [];
        const next = currentIdx + delta;
        if (next >= 0 && next < items.length) open(next);
      }

      document.addEventListener('keydown', (e) => {
        if (!overlay || overlay.style.display === 'none') return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowLeft') step(-1);
        else if (e.key === 'ArrowRight') step(+1);
      });

      window.openStillLightbox = open;
    })();
  </script>
  <script type="module" src="js/nav-session.js"></script>
</body>
</html>
