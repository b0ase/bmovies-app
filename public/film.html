<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="js/session-sanitizer.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Watch an AI-produced film on bMovies." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta property="og:type" content="video.movie" />
  <meta property="og:title" content="bMovies — Film" />
  <meta property="og:description" content="AI-produced film on bMovies." />
  <meta property="og:image" content="https://bmovies.online/bmovies_og.jpg" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #000; color: #e5e5e5; min-height: 100vh; }

    .film-hero {
      position: relative;
      /* Capped so the hero doesn't eat multiple screens — a common
         regression when the background storyboard frame is tall. */
      min-height: 520px;
      max-height: min(70vh, 720px);
      background: #000; overflow: hidden;
    }
    .film-hero .bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: brightness(0.35);
    }
    .film-hero .vignette {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.95) 100%);
    }
    .film-hero .content {
      position: relative; z-index: 2; max-width: 1200px;
      margin: 0 auto; padding: 5rem 3rem 4rem;
      display: flex; gap: 3rem; align-items: flex-end;
    }
    .film-hero .poster {
      width: 240px; flex-shrink: 0; aspect-ratio: 2/3;
      background: #111; border: 2px solid #222;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .film-hero .poster img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .film-hero .info { flex: 1; }
    .film-hero .kicker {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #E50914; font-weight: 700;
    }
    .film-hero h1 {
      font-family: 'Bebas Neue', 'Oswald', sans-serif;
      font-size: 5rem; color: #fff; letter-spacing: 0.02em;
      line-height: 1; margin-top: 0.5rem;
    }
    .film-hero .tagline {
      font-size: 1.2rem; color: #ccc; line-height: 1.5;
      margin-top: 1rem; max-width: 620px;
    }
    .film-hero .meta {
      display: flex; gap: 1.5rem; margin-top: 1.5rem;
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #888;
    }
    .film-hero .meta strong { color: #E50914; }
    .film-hero .cta-row {
      display: flex; gap: 0.8rem; margin-top: 2rem;
    }

    /* Three-tier button row */
    .tier-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem; margin-top: 1.5rem;
      max-width: 620px;
    }
    .tier-btn {
      padding: 0.8rem 0.6rem; font-family: inherit;
      font-size: 0.6rem; font-weight: 900; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
      border: 1px solid #333; color: #aaa;
      transition: all 0.2s;
    }
    .tier-btn:not(:disabled):hover {
      background: rgba(229, 9, 20, 0.2);
      border-color: #E50914;
      color: #fff;
    }
    .tier-btn.current {
      background: #E50914 !important; border-color: #E50914;
      color: #fff; cursor: default;
    }
    .tier-btn.included {
      background: rgba(107, 255, 138, 0.1); border-color: #2a4a33;
      color: #6bff8a; cursor: default;
    }
    .tier-btn.upgrade {
      border-color: #E50914; color: #E50914;
    }
    @media (max-width: 720px) {
      .tier-row { grid-template-columns: 1fr; max-width: none; }
    }
    .film-hero .cta {
      padding: 1rem 2rem; font-size: 0.8rem; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; border: 1px solid #fff; color: #fff;
      cursor: pointer;
    }
    .film-hero .cta.primary {
      background: #E50914; border-color: #E50914;
    }
    .film-hero .cta.primary:hover { background: #c4070f; }
    .film-hero .cta:hover { background: rgba(255,255,255,0.1); }
    .film-hero .cta.primary:hover { background: #c4070f; }

    main { max-width: 1200px; margin: 0 auto; padding: 3rem; }

    .section { margin-top: 3rem; }
    .section h2 {
      font-size: 1.6rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: -0.02em; color: #fff; margin-bottom: 1.5rem;
    }

    /* Cast grid */
    .crew-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .crew-member {
      border: 1px solid #222; background: #0a0a0a;
      padding: 0; overflow: hidden;
    }
    .crew-member .photo {
      width: 100%; aspect-ratio: 1; background: #111; overflow: hidden;
    }
    .crew-member .photo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .crew-member .body { padding: 0.8rem; }
    .crew-member .role {
      font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #E50914; font-weight: 700;
    }
    .crew-member .name {
      font-size: 0.85rem; font-weight: 900; color: #fff;
      margin-top: 0.25rem; line-height: 1.2;
    }
    .crew-member .studio {
      font-size: 0.55rem; color: #555; margin-top: 0.2rem;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* Trailer / preview block */
    .preview-block {
      border: 1px solid #222; background: #0a0a0a; padding: 2rem;
      font-size: 1rem; line-height: 1.7; color: #ccc;
      max-width: 820px;
    }
    .preview-block .first-line {
      font-size: 1.3rem; color: #fff; font-weight: 700;
      display: block; margin-bottom: 1rem;
    }
    .preview-block.locked {
      position: relative;
    }
    .preview-block.locked::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 60%;
      background: linear-gradient(transparent, #0a0a0a);
      pointer-events: none;
    }

    /* Synopsis */
    .synopsis {
      font-size: 1.05rem; line-height: 1.7; color: #ccc;
      max-width: 820px;
    }

    /* Studio card */
    .studio-card {
      border: 1px solid #222; background: #0a0a0a; padding: 1.5rem;
      display: flex; gap: 1.5rem; align-items: center; max-width: 620px;
    }
    .studio-card img {
      width: 120px; height: 80px; object-fit: cover; flex-shrink: 0;
    }
    .studio-card .sc-info { flex: 1; }
    .studio-card .sc-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #fff;
      letter-spacing: 0.03em; line-height: 1;
    }
    .studio-card .sc-genre {
      font-size: 0.6rem; color: #E50914; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.3rem;
    }

    .state {
      text-align: center; padding: 6rem 0; color: #555;
    }
    .state h2 { color: #333; font-size: 2rem; }

    @media (max-width: 860px) {
      .film-hero .content { flex-direction: column; align-items: center; text-align: center; padding: 4rem 2rem 3rem; }
      .film-hero .poster { width: 180px; }
      .film-hero h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <!-- Storyboard lightbox modal -->

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.103.0';
    import { renderCascade, WATCH_PRICE_SATS } from './js/cascade.js';
    import { openPayPicker } from './js/pay-picker.js';
    const supabase = createClient('https://api.b0ase.com',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzY3Mzk3ODYzLCJleHAiOjE5MjUwNzc4NjN9.dJlnc64RLPA1jwDaPk8gA1suwnBn7r0I5L5eojM3Iig');

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    // Poster overrides — local static JPGs under public/img/films/.
    // These are authoritative: they win over bct_artifacts because the
    // DB stores ephemeral xAI temp URLs (imgen.x.ai/...) that expire
    // in ~24h. When a new commission comes in, generate a poster with
    // scripts/batch-posters.ts and add the title here (keys MUST be
    // lowercased; punctuation in keys must exactly match .toLowerCase()
    // on the DB title, including apostrophes from unicode).
    //
    // Keep this map in sync with public/productions.html's POSTER_MAP.
    const POSTER_MAP = {
      // Legacy marketplace / test films
      'echoes of the last signal':           'img/films/echoes-of-the-last-signal.jpg',
      'the fold':                            'img/films/the-fold.jpg',
      'the weight of water':                 'img/films/the-weight-of-water.jpg',
      'the lantern that forgot its flame':   'img/films/the-lantern-that-forgot-its-flame.jpg',
      'the mirror protocol':                 'img/films/the-mirror-protocol.jpg',
      'off-key heroes':                      'img/films/off-key-heroes.jpg',
      'midnight swarm':                      'img/films/midnight-swarm.jpg',
      'the last piece':                      'img/films/the-last-piece.jpg',
      'star wars episode 1000':              'img/films/episode-1000.jpg',
      // Current slate (generated via batch-posters.ts, 2026-04-15)
      "that weirdo isn't satoshi":           'img/films/that-weirdo-isnt-satoshi.jpg',
      'spoon from space':                    'img/films/spoon-from-space.jpg',
      'silverfish in the cathedral':         'img/films/silverfish-in-the-cathedral.jpg',
      'the clockmakers daughter':            'img/films/the-clockmakers-daughter.jpg',
      'the cartographer who mapped dreams':  'img/films/the-cartographer-who-mapped-dreams.jpg',
      'the coffee machine':                  'img/films/the-coffee-machine.jpg',
      // Judge coupon DEFAULT_TITLES + older demo rows (generated via
      // scripts/generate-missing-posters.ts, 2026-04-16)
      'the last lighthouse':                 'img/films/the-last-lighthouse.jpg',
      'cipher of the drowned city':          'img/films/cipher-of-the-drowned-city.jpg',
      'echoes beneath glacier 9':            'img/films/echoes-beneath-glacier-9.jpg',
      'the cartographer of empty rooms':     'img/films/the-cartographer-of-empty-rooms.jpg',
      'pale horse, iron sky':                'img/films/pale-horse-iron-sky.jpg',
      'sub-orbital lullaby':                 'img/films/sub-orbital-lullaby.jpg',
      'glasshouse':                          'img/films/glasshouse.jpg',
      'the last transmission':               'img/films/the-last-transmission.jpg',
      'crypto whistleblow':                  'img/films/crypto-whistleblow.jpg',
    };

    // Map film ID prefix to studio (for test films)
    const FILM_STUDIO_MAP = {
      'mkt-test-echox': { id: '21st-century-bot', name: '21st Century Bot', genre: 'Epic Sci-Fi Blockbusters' },
      'mkt-test-foldx': { id: 'clanker-bros', name: 'Clanker Bros', genre: 'Dark Gritty Thrillers' },
      'mkt-test-twowx': { id: 'paramountal-ai', name: 'Paramountal AI', genre: 'Prestige Drama' },
      'mkt-test-lantn': { id: 'dreamforge', name: 'DreamForge', genre: 'Animated Fantasy & Adventure' },
      'mkt-test-mirpx': { id: 'neuralscope', name: 'NeuralScope Pictures', genre: 'Cerebral Mindbenders' },
      'mkt-test-offky': { id: 'bolt-disney', name: 'Bolt Disney', genre: 'Family Entertainment & Musicals' },
    };

    function findStudio(offerId) {
      for (const prefix in FILM_STUDIO_MAP) {
        if (offerId.startsWith(prefix)) return FILM_STUDIO_MAP[prefix];
      }
      return null;
    }

    function decodeDataUrl(url) {
      if (!url || !url.startsWith('data:')) return null;
      try {
        const idx = url.indexOf(',');
        if (idx < 0) return null;
        return decodeURIComponent(url.slice(idx + 1));
      } catch { return null; }
    }

    const TIER_ORDER = ['trailer', 'short', 'feature'];
    const TIER_META = {
      trailer: { label: 'Trailer', price: 9.99, display: '$9.99' },
      short:   { label: 'Short',   price: 99,   display: '$99' },
      feature: { label: 'Feature', price: 999,  display: '$999' },
    };

    function renderTierRow(offer) {
      const currentTier = offer.tier || 'feature';
      const currentIdx = TIER_ORDER.indexOf(currentTier);
      return `
        <div class="tier-row">
          ${TIER_ORDER.map(t => {
            const meta = TIER_META[t];
            const isCurrent = t === currentTier;
            const isLower = TIER_ORDER.indexOf(t) < currentIdx;
            const isUpgrade = TIER_ORDER.indexOf(t) > currentIdx;
            let state = '';
            let label = '';
            if (isCurrent) {
              state = 'current';
              label = `✓ ${meta.label}`;
            } else if (isLower) {
              state = 'included';
              label = `${meta.label} (included)`;
            } else if (isUpgrade) {
              state = 'upgrade';
              label = `Commission as ${meta.label} · ${meta.display}`;
            }
            return `
              <button class="tier-btn ${state}" data-tier="${t}" ${isLower || isCurrent ? 'disabled' : ''}>
                ${label}
              </button>
            `;
          }).join('')}
        </div>
      `;
    }

    // Strip AI meta-commentary from agent outputs: "Below is...",
    // "I've adopted...", "Here's the..." etc. These leak because the
    // writer prompt wasn't strict enough. This cleans the display.
    function stripMeta(text) {
      if (!text) return text;
      // Split on double newlines, drop leading paragraphs that look
      // like meta-commentary rather than actual content.
      const metaPatterns = [
        /^below is /i,
        /^here('s| is) /i,
        /^i['’]ve adopted /i,
        /^i['’]ll /i,
        /^the treatment is /i,
        /^let me /i,
        /^this treatment /i,
      ];
      const paras = text.split(/\n\n+/);
      while (paras.length > 0) {
        const p = paras[0].trim();
        if (metaPatterns.some(re => re.test(p))) {
          paras.shift();
        } else {
          break;
        }
      }
      return paras.join('\n\n');
    }

    async function load(offerId) {
      const { data: offer, error } = await supabase
        .from('bct_offers')
        .select('id, title, synopsis, status, token_ticker, tier, commissioner_percent, trailer_video_url, parent_offer_id, bct_artifacts(id, kind, url, model, role, agent_id, prompt)')
        .eq('id', offerId)
        .maybeSingle();
      if (error) throw error;
      return offer;
    }

    async function loadAgents(agentIds) {
      if (agentIds.length === 0) return {};
      const { data } = await supabase
        .from('bct_agents')
        .select('id, name, studio, role, persona, reputation, jobs_completed')
        .in('id', agentIds);
      const map = {};
      (data || []).forEach(a => { map[a.id] = a; });
      return map;
    }

    async function loadStudioTeam(studioId) {
      if (!studioId) return [];
      const { data } = await supabase
        .from('bct_agents')
        .select('id, name, studio, role, persona, reputation, jobs_completed')
        .eq('studio', studioId);
      return data || [];
    }

    async function loadParent(parentOfferId) {
      if (!parentOfferId) return null;
      const { data } = await supabase
        .from('bct_offers')
        .select('id, title, tier, token_ticker, parent_offer_id')
        .eq('id', parentOfferId)
        .maybeSingle();
      return data || null;
    }

    async function loadDerivatives(offerId) {
      const { data } = await supabase
        .from('bct_offers')
        .select('id, title, tier, token_ticker, status')
        .eq('parent_offer_id', offerId)
        .order('id', { ascending: false });
      return data || [];
    }

    function agentImagePath(agentId, agent) {
      if (!agent) return null;
      // Files were generated as "Sound Design" not "Sound Designer" so
      // sound_designer resolves to `sound-design` without the trailing 'er'.
      let role = agent.role.replace('_', '-').toLowerCase();
      if (role === 'sound-designer') role = 'sound-design';
      const name = agent.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      return `img/studios/agents/${agent.studio}--${role}${name}.jpg`;
    }

    function render(offer) {
      const root = document.getElementById('root');
      // xAI temp CDN URLs expire in ~24h. Reject them everywhere so
      // they can never win the priority chain against a local POSTER_MAP.
      const isEphemeralUrl = (u) => typeof u === 'string' && /imgen\.x\.ai\/xai-imgen\/xai-tmp/.test(u);
      const rawArts = offer.bct_artifacts || [];
      const arts = rawArts.filter((a) => !isEphemeralUrl(a.url));
      const posterArt = arts.find(a => a.role === 'poster' && a.kind === 'image');
      const storyboard = arts.find(a => a.role === 'storyboard' && a.kind === 'image');
      const writer = rawArts.find(a => a.role === 'writer' && a.kind === 'text');
      const posterUrl = POSTER_MAP[(offer.title || '').toLowerCase()];
      // Priority: POSTER_MAP override (commissioner-curated static JPG,
      // always permanent) → non-ephemeral poster artifact → non-ephemeral
      // storyboard frame. POSTER_MAP wins because anything in the DB
      // that isn't already filtered out is still a potential time-bomb
      // (e.g. an un-mirrored upstream URL we haven't seen before).
      const titleEsc = esc((offer.title || 'Untitled').slice(0, 20));
      const placeholderSvg = 'data:image/svg+xml,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600"><rect width="400" height="600" fill="#0a0a0a"/><rect width="400" height="4" fill="#E50914"/><rect y="596" width="400" height="4" fill="#E50914"/><text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="900" fill="#fff">${titleEsc}</text><text x="200" y="560" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333" letter-spacing="3">GENERATING</text></svg>`
      );
      const heroImage = posterUrl || posterArt?.url || storyboard?.url || placeholderSvg;
      const studio = findStudio(offer.id);

      const writerText = writer ? decodeDataUrl(writer.url) : null;
      // Always use the offer synopsis for the preview. The writer's
      // treatment is the FULL film and is gated behind the paywall.
      const previewText = (offer.synopsis || '').slice(0, 600);

      document.title = `bMovies — ${offer.title}`;

      const rolesDelivered = arts.filter(a => a.role).length;
      const agentIds = [...new Set(arts.map(a => a.agent_id).filter(Boolean))];

      Promise.all([
        loadStudioTeam(studio?.id),
        loadParent(offer.parent_offer_id),
        loadDerivatives(offer.id),
      ]).then(([team, parent, derivatives]) => {
        // Map delivered roles to their artifacts
        const deliveredByRole = {};
        arts.forEach(a => { if (a.role) deliveredByRole[a.role] = a; });

        const roleOrder = ['director', 'writer', 'producer', 'cinematographer', 'storyboard', 'editor', 'composer', 'sound_designer'];
        const sortedTeam = team.sort((a, b) => {
          return (roleOrder.indexOf(a.role) - roleOrder.indexOf(b.role));
        });

        const castHtml = sortedTeam.map(agent => {
          const delivered = deliveredByRole[agent.role];
          const imgPath = agentImagePath(agent.id, agent);
          return `
            <div class="crew-member">
              <div class="photo">
                <img src="${esc(imgPath)}" alt="${esc(agent.name)}" loading="lazy"
                     onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:2rem;\\'>👤</div>'" />
              </div>
              <div class="body">

          const idxEl = document.getElementById('film-scene-idx');
          const thumbs = document.querySelectorAll('.film-scene-thumb');
          if (!player || !idxEl) return;
          let current = 0;
          function load(i) {
            if (i < 0 || i >= playlist.length) return;
            current = i;
            player.src = playlist[i].url;
            player.play().catch(() => {});
            idxEl.textContent = String(i + 1);
            thumbs.forEach((b, j) => {
              b.style.background = j === i ? '#e50914' : '#1a1a1a';
              b.style.borderColor = j === i ? '#e50914' : '#2a2a2a';
              b.style.color = j === i ? '#fff' : '#aaa';
            });
          }
          player.addEventListener('ended', () => {
            if (current + 1 < playlist.length) load(current + 1);
          });
          thumbs.forEach((b, j) => b.addEventListener('click', () => load(j)));

                const err = await res.json();
                throw new Error(err.error || 'Checkout failed');

      try {

        const map = JSON.parse(raw);
        return map[offerId] || null;
      } catch { return null; }
    }
    function setUnlock(offerId, payload) {
      try {
        const raw = localStorage.getItem('bmovies_unlocks');
        const map = raw ? JSON.parse(raw) : {};
        map[offerId] = payload;
        localStorage.setItem('bmovies_unlocks', JSON.stringify(map));
      } catch {}
    }

        btn.disabled = true;
        return;

      const params = new URLSearchParams(window.location.search);
      const justPaid = params.get('ticket') === 'paid';

      if (justPaid || cached) {

        btn.textContent = '✓ Watching';

              ${esc((offer.synopsis || '').slice(0, 400))}
            </div>
            <a href="deck.html?id=${encodeURIComponent(offer.id)}" style="display:inline-block;margin-top:1.2rem;padding:0.7rem 1.4rem;border:1px solid #E50914;color:#E50914;text-decoration:none;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">
              Read full treatment →
            </a>
          </div>
        ` : ''}

        ${storyboardFrames.length > 0 ? `
          <div class="section">
            <h2>Storyboard${storyboardFrames.length > 1 ? ' · ' + storyboardFrames.length + ' frames' : ''}</h2>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.8rem;max-width:960px;">
              ${storyboardFrames.map((f, i) => `
                <button
                  onclick="window.openStoryboardModal(${i})"
                  style="border:1px solid #222;background:#0a0a0a;overflow:hidden;padding:0;cursor:pointer;font-family:inherit;text-align:left;display:block;"
                  onmouseover="this.style.borderColor='#E50914'"
                  onmouseout="this.style.borderColor='#222'">
                  <img src="${esc(f.url)}" alt="Frame ${i + 1}" loading="lazy" style="width:100%;height:auto;display:block;" />
                  <div style="padding:0.5rem 0.8rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Frame ${String(i + 1).padStart(2, '0')} — click to expand</div>
                </button>
              `).join('')}
            </div>
          </div>
        ` : ''}

        ${composer ? `
          <div class="section">
            <h2>The score</h2>
            <audio controls preload="none" src="${esc(composer.url)}" style="width:100%;max-width:620px;filter:invert(1) hue-rotate(180deg);"></audio>
          </div>
        ` : ''}

        ${(directorText || editorText || soundText) ? `
          <div class="section">
            <h2>Production notes</h2>
            <p style="color:#888;font-size:0.85rem;max-width:620px;">
              Director's vision, editing plan, and sound design are in the investor pack.
            </p>
            <a href="deck.html?id=${encodeURIComponent(offer.id)}" style="display:inline-block;margin-top:0.8rem;padding:0.7rem 1.4rem;border:1px solid #333;color:#ccc;text-decoration:none;font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">
              View investor pack →
            </a>
          </div>
        ` : ''}
      `;

      const target = document.getElementById('full-playback');
      target.innerHTML = html;
      target.style.display = 'block';

      // Wire sequential video playback — plays through all clips in order,
      // fading between them, and loops back to clip 1 after the last.
      (function wireSequentialPlayer() {
        const clips = window._trailerClips || [];
        if (clips.length < 2) return; // single clip already plays fine
        const player = document.getElementById('main-video');
        const idxEl = document.getElementById('main-video-idx');
        const thumbContainer = document.getElementById('main-video-thumbs');
        if (!player) return;
        let current = 0;

        function highlightThumb(idx) {
          if (!thumbContainer) return;
          thumbContainer.querySelectorAll('button[data-clip-idx]').forEach((btn, j) => {
            btn.style.borderColor = j === idx ? '#e50914' : '#222';
            btn.style.background = j === idx ? '#1a0003' : '#0a0a0a';
          });
        }

        function loadClip(idx) {
          current = idx;
          // Fade out
          player.style.opacity = '0';
          setTimeout(() => {
            player.src = clips[idx];
            player.play().catch(() => {});
            if (idxEl) idxEl.textContent = String(idx + 1);
            highlightThumb(idx);
            // Fade in
            player.style.opacity = '1';
          }, 300);
        }

        player.addEventListener('ended', () => {
          const next = (current + 1) % clips.length;
          loadClip(next);
        });

        // Manual thumb clicks
        if (thumbContainer) {
          thumbContainer.querySelectorAll('button[data-clip-idx]').forEach(btn => {
            btn.addEventListener('click', () => {
              const idx = parseInt(btn.getAttribute('data-clip-idx'), 10);
              if (!isNaN(idx) && idx >= 0 && idx < clips.length) loadClip(idx);
            });
          });
        }
      })();

      // Wire storyboard modal
      window.__storyboardFrames = storyboardFrames;
      window.__storyboardIdx = 0;
    }

    window.openStoryboardModal = function(idx) {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = idx;
      const modal = document.getElementById('sb-modal');
      const img = document.getElementById('sb-modal-img');
      const desc = document.getElementById('sb-modal-desc');
      const label = document.getElementById('sb-modal-label');
      const f = frames[idx];
      img.src = f.url;
      desc.textContent = f.prompt || 'No scene description available.';
      label.textContent = `Frame ${String(idx + 1).padStart(2, '0')} of ${frames.length}`;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    window.closeStoryboardModal = function() {
      document.getElementById('sb-modal').style.display = 'none';
      document.body.style.overflow = '';
    };

    window.storyboardPrev = function() {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = (window.__storyboardIdx - 1 + frames.length) % frames.length;
      window.openStoryboardModal(window.__storyboardIdx);
    };

    window.storyboardNext = function() {
      const frames = window.__storyboardFrames || [];
      if (!frames.length) return;
      window.__storyboardIdx = (window.__storyboardIdx + 1) % frames.length;
      window.openStoryboardModal(window.__storyboardIdx);
    };

    // Keyboard navigation for the modal
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('sb-modal');
      if (modal.style.display !== 'flex') return;
      if (e.key === 'Escape') window.closeStoryboardModal();
      if (e.key === 'ArrowLeft') window.storyboardPrev();
      if (e.key === 'ArrowRight') window.storyboardNext();
    });

    // Click backdrop to close
    document.getElementById('sb-modal').addEventListener('click', (e) => {
      if (e.target.id === 'sb-modal') window.closeStoryboardModal();
    });

    const params = new URLSearchParams(window.location.search);
    const offerId = params.get('id');

    if (!offerId) {
      document.getElementById('root').innerHTML = '<div class="state"><h2>No film selected</h2><p><a href="watch.html" style="color:#E50914;">Browse films →</a></p></div>';
    } else {
      load(offerId).then(offer => {
        if (!offer) {
          document.getElementById('root').innerHTML = '<div class="state"><h2>Film not found</h2><p><a href="watch.html" style="color:#E50914;">Browse films →</a></p></div>';
          return;
        }
        render(offer);
      }).catch(err => {
        document.getElementById('root').innerHTML = `<div class="state"><h2>Error</h2><p>${esc(err.message || String(err))}</p></div>`;
      });
    }
  </script>
  <script type="module" src="js/nav-session.js"></script>
</body>
</html>
