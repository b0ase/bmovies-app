<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="js/session-sanitizer.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bMovies — Live Production</title>
  <meta name="description" content="Watch a feature film being produced by 12 autonomous AI agents in real time. Every step is on-chain, every artifact is versioned, every payment is recorded." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="bMovies — Live Production Timeline" />
  <meta property="og:description" content="Watch an autonomous AI feature film production unfold step by step." />
  <meta property="og:image" content="https://bmovies.online/bmovies_og.jpg" />
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #e8e8e8;
      min-height: 100vh;
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 2rem 6rem;
    }

    /* ───── Header card ───── */
    .head {
      border: 1px solid #222;
      background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .head .kicker { font-size: 0.65rem; color: #e50914; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 700; }
    .head h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.6rem;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: #fff;
      margin-top: 0.4rem;
    }
    .head .ticker { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #888; margin-top: 0.4rem; }
    .head .meta-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.8rem;
    }
    @media (max-width: 720px) { .head .meta-row { grid-template-columns: repeat(2, 1fr); } }
    .meta-cell {
      border: 1px solid #1a1a1a;
      background: #050505;
      padding: 0.9rem 1rem;
    }
    .meta-cell .label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.12em; color: #666; font-weight: 700; }
    .meta-cell .value { font-size: 1rem; font-weight: 700; color: #fff; margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; }
    .meta-cell .value.green { color: #6bff8a; }
    .meta-cell .value.red { color: #e50914; }
    .meta-cell .value.pulse { animation: tx-pulse 2s ease-out; }
    @keyframes tx-pulse {
      0% { color: #fff; text-shadow: 0 0 16px #e50914; }
      100% { color: #fff; text-shadow: none; }
    }

    /* ───── Phase strip ───── */
    .phases {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
      margin-top: 2rem;
    }
    @media (max-width: 720px) { .phases { grid-template-columns: 1fr 1fr; } }
    .phase {
      border: 1px solid #1a1a1a;
      background: #050505;
      padding: 1rem;
      transition: border-color 0.3s, background 0.3s;
    }
    .phase.done { border-color: #1f4d2a; background: #061008; }
    .phase.active { border-color: #e50914; background: #150406; box-shadow: 0 0 24px rgba(229, 9, 20, 0.18); }
    .phase .name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.04em; color: #fff; }
    .phase .num { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.12em; color: #666; font-weight: 700; }
    .phase .pct { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #888; margin-top: 0.3rem; }
    .phase.active .pct { color: #e50914; }
    .phase.done .pct { color: #6bff8a; }

    /* ───── Timeline ───── */
    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }

    .timeline {
      border: 1px solid #222;
      background: #0a0a0a;
      padding: 1.5rem;
    }
    .timeline h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 1rem;
      border-bottom: 1px solid #222;
      padding-bottom: 0.6rem;
    }
    .step {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 0.8rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #161616;
      align-items: center;
    }
    .step:last-child { border-bottom: none; }
    .step .dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2a2a; margin-left: 6px; }
    .step.done .dot { background: #6bff8a; box-shadow: 0 0 8px rgba(107, 255, 138, 0.5); }
    .step.active .dot { background: #e50914; box-shadow: 0 0 8px rgba(229, 9, 20, 0.6); animation: pulse 1.4s infinite; }
    .step.failed .dot { background: #ff4d4d; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .step .info { display: flex; flex-direction: column; }
    .step .info .step-name { font-size: 0.85rem; color: #ddd; font-weight: 600; }
    .step .info .step-meta { font-size: 0.65rem; color: #666; font-family: 'JetBrains Mono', monospace; margin-top: 0.15rem; }
    .step .right { font-size: 0.65rem; color: #888; font-family: 'JetBrains Mono', monospace; text-align: right; }
    .step .right a { color: #e50914; text-decoration: none; }
    .step .right a:hover { text-decoration: underline; }

    /* ───── Live tail ───── */
    .tail {
      border: 1px solid #222;
      background: #0a0a0a;
      padding: 1.5rem;
      max-height: 800px;
      overflow-y: auto;
    }
    .tail h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 1rem;
      border-bottom: 1px solid #222;
      padding-bottom: 0.6rem;
    }
    .event {
      padding: 0.6rem 0;
      border-bottom: 1px solid #161616;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #aaa;
      line-height: 1.5;
    }
    .event:last-child { border-bottom: none; }
    .event .ts { color: #555; }
    .event .step { color: #6ba8ff; display: inline; padding: 0; margin: 0; border: none; }
    .event .status-completed { color: #6bff8a; }
    .event .status-failed { color: #ff4d4d; }
    .event .status-started { color: #e8c46b; }
    .event .msg { color: #ccc; display: block; margin-top: 0.2rem; }
    .event .tx { color: #888; }
    .event .tx a { color: #888; }

    .empty {
      padding: 2rem;
      text-align: center;
      color: #555;
      font-size: 0.85rem;
    }

    /* ───── Artifacts grid ───── */
    .deliverables {
      margin-top: 1.5rem;
      border: 1px solid #222;
      background: #0a0a0a;
      padding: 1.5rem;
    }
    .deliverables h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 0.4rem;
      border-bottom: 1px solid #222;
      padding-bottom: 0.6rem;
    }
    .deliverables .sub {
      font-size: 0.75rem;
      color: #777;
      margin-bottom: 1rem;
    }
    .art-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .art-card {
      border: 1px solid #1a1a1a;
      background: #050505;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .art-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .art-card video, .art-card audio {
      width: 100%;
      display: block;
      background: #000;
    }
    .art-card.art-text { padding: 0.9rem; }
    .art-text-preview {
      font-size: 0.72rem;
      color: #aaa;
      line-height: 1.55;
      max-height: 100px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }
    .art-read-more {
      display: inline-block;
      margin-top: 0.6rem;
      font-size: 0.65rem;
      color: #e50914;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }
    .art-read-more:hover { text-decoration: underline; }
    .art-meta {
      padding: 0.6rem 0.8rem;
      border-top: 1px solid #1a1a1a;
      background: #0a0a0a;
    }
    .art-card.art-text .art-meta { padding: 0.6rem 0; border-top: 1px solid #1a1a1a; margin-top: 0.6rem; background: transparent; }
    .art-title {
      font-size: 0.75rem;
      color: #fff;
      font-weight: 600;
      text-transform: capitalize;
    }
    .art-sub {
      font-size: 0.6rem;
      color: #666;
      margin-top: 0.2rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .draft-banner {
      background: linear-gradient(90deg, #2a2206, #1a1404);
      border: 1px solid #5a4a0e;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #e8c46b;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .draft-banner .label {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ffd84d;
    }

    /* ─── Recut deck ───
       The creative-tools recut panel. Draft-only. Visual scaffold
       for the PDF "Don't like the ending? Recut it" promise. */
    .recut-deck {
      border: 1px solid #2a2a2a;
      background: linear-gradient(180deg, #1a0006 0%, #0a0a0a 100%);
      padding: 1.6rem 1.6rem 2rem;
      margin-bottom: 1.6rem;
    }
    .recut-deck-head { margin-bottom: 1.4rem; }
    .recut-deck-eyebrow {
      font-size: 0.55rem;
      color: #E50914;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .recut-deck-head h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: #fff;
      letter-spacing: 0.01em;
      margin-top: 0.3rem;
      line-height: 1;
    }
    .recut-deck-head h2 .r { color: #E50914; }
    .recut-deck-head p {
      font-size: 0.78rem;
      color: #888;
      line-height: 1.55;
      margin-top: 0.6rem;
      max-width: 760px;
    }
    .recut-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    @media (max-width: 900px) {
      .recut-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .recut-grid { grid-template-columns: 1fr; }
    }
    .recut-card {
      border: 1px solid #2a1414;
      background: #0a0a0a;
      padding: 1rem 1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .recut-card:hover {
      border-color: #E50914;
      background: #110404;
    }
    .recut-tag {
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      font-size: 0.55rem;
      color: #E50914;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .recut-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: 0.01em;
      line-height: 1.05;
      margin: 0;
    }
    .recut-card p {
      font-size: 0.72rem;
      color: #999;
      line-height: 1.5;
      margin: 0;
      flex: 1;
    }
    .recut-role {
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      font-size: 0.55rem;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-top: 1px dashed #1a1a1a;
      padding-top: 0.5rem;
      margin-top: 0.2rem;
    }
    .recut-btn {
      margin-top: 0.4rem;
      padding: 0.55rem 0.8rem;
      background: #E50914;
      border: 1px solid #E50914;
      color: #fff;
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      align-self: flex-start;
    }
    .recut-btn:disabled {
      background: #2a1414;
      border-color: #2a1414;
      color: #888;
      cursor: wait;
    }
  </style>
</head>
<body>
  <script>
    if (new URLSearchParams(location.search).has('embed')) {
      document.documentElement.classList.add('embedded');
    }
  </script>
  <style>.embedded .site-header, .embedded .site-footer, .embedded header.site-header { display: none !important; } .embedded main { padding-top: 1rem !important; }</style>
  <header class="site-header"></header>

  <main>
    <div id="root">
      <div class="empty"><h2 style="font-family:'Bebas Neue';font-size:2rem;color:#888;">Loading production…</h2></div>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.103.0';
    const supabase = createClient(
      'https://api.b0ase.com',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzY3Mzk3ODYzLCJleHAiOjE5MjUwNzc4NjN9.dJlnc64RLPA1jwDaPk8gA1suwnBn7r0I5L5eojM3Iig',
      { auth: { storageKey: 'bmovies-auth', lock: false } }
    );

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const root = document.getElementById('root');

    // ─── 28 named pipeline steps in their canonical order ───
    // Mirrors PIPELINE in scripts/feature-worker.ts. Used to render
    // the timeline even when the worker hasn't reached a step yet.
    const PIPELINE_STEPS = [
      { id: 'producer.token_mint',    phase: 'preproduction', label: 'Register royalty shares (1B supply)' },
      { id: 'producer.kickoff',       phase: 'preproduction', label: 'Producer kickoff' },
      { id: 'writer.logline',         phase: 'preproduction', label: 'Writer — logline' },
      { id: 'writer.synopsis',        phase: 'preproduction', label: 'Writer — synopsis' },
      { id: 'writer.treatment',       phase: 'preproduction', label: 'Writer — treatment (1500-2000 words)' },
      { id: 'writer.beat_sheet',      phase: 'preproduction', label: 'Writer — beat sheet (15 beats)' },
      { id: 'writer.screenplay',      phase: 'preproduction', label: 'Writer — screenplay (opening scenes)' },
      { id: 'director.vision',        phase: 'preproduction', label: "Director's vision statement" },
      { id: 'casting.cast_list',      phase: 'preproduction', label: 'Casting — cast list' },
      { id: 'production.lookbook',    phase: 'preproduction', label: 'Production designer — lookbook' },
      { id: 'dp.shot_plan',           phase: 'preproduction', label: 'Cinematographer — shot plan' },
      { id: 'storyboard.pack',        phase: 'preproduction', label: 'Storyboard artist — 12 frames' },
      { id: 'composer.themes',        phase: 'preproduction', label: 'Composer — themes & cues' },
      { id: 'producer.bible',         phase: 'preproduction', label: 'Producer — production bible' },
      { id: 'phase2.start',           phase: 'production',    label: 'Production — kickoff' },
      { id: 'phase2.scene_loop',      phase: 'production',    label: 'Scene generation loop' },
      { id: 'editor.rough_cut',       phase: 'post',          label: 'Editor — rough cut' },
      { id: 'editor.fine_cut',        phase: 'post',          label: 'Editor — fine cut' },
      { id: 'composer.final_score',   phase: 'post',          label: 'Composer — final score' },
      { id: 'sound.final_mix',        phase: 'post',          label: 'Sound designer — final mix' },
      { id: 'editor.picture_lock',    phase: 'post',          label: 'Editor — picture lock' },
      { id: 'editor.trailer_cut',     phase: 'delivery',      label: 'Editor — trailer cut' },
      { id: 'storyboard.poster',      phase: 'delivery',      label: 'One-sheet poster' },
      { id: 'publicist.epk',          phase: 'delivery',      label: 'Publicist — EPK' },
      { id: 'producer.investor_deck', phase: 'delivery',      label: 'Producer — investor deck' },
      { id: 'producer.draft_open',    phase: 'delivery',      label: 'Open draft & presale' },
    ];

    const PHASE_LABELS = {
      preproduction: { num: '01', name: 'Pre-production' },
      production:    { num: '02', name: 'Production' },
      post:          { num: '03', name: 'Post-production' },
      delivery:      { num: '04', name: 'Delivery & draft' },
    };

    // ─── Canonical poster override ──────────────────────────────
    //
    // Many offers on the site are demo rows with no DB artifacts, or have
    // DB artifacts whose URLs point at the xAI temp CDN (expires in hours).
    // POSTER_MAP is the commissioner-curated static poster set under
    // /img/films/ and always wins over DB artifacts so we can fix a dead
    // poster without a migration.
    //
    // Keep this map in sync with public/productions.html and public/film.html.
    const POSTER_MAP = {
      // Legacy marketplace / test films
      'echoes of the last signal':           'img/films/echoes-of-the-last-signal.jpg',
      'the fold':                            'img/films/the-fold.jpg',
      'the weight of water':                 'img/films/the-weight-of-water.jpg',
      'the lantern that forgot its flame':   'img/films/the-lantern-that-forgot-its-flame.jpg',
      'the mirror protocol':                 'img/films/the-mirror-protocol.jpg',
      'off-key heroes':                      'img/films/off-key-heroes.jpg',
      'midnight swarm':                      'img/films/midnight-swarm.jpg',
      'the last piece':                      'img/films/the-last-piece.jpg',
      'star wars episode 1000':              'img/films/episode-1000.jpg',
      // Current slate (generated via batch-posters.ts, 2026-04-15)
      "that weirdo isn't satoshi":           'img/films/that-weirdo-isnt-satoshi.jpg',
      'spoon from space':                    'img/films/spoon-from-space.jpg',
      'silverfish in the cathedral':         'img/films/silverfish-in-the-cathedral.jpg',
      'the clockmakers daughter':            'img/films/the-clockmakers-daughter.jpg',
      'the cartographer who mapped dreams':  'img/films/the-cartographer-who-mapped-dreams.jpg',
      'the coffee machine':                  'img/films/the-coffee-machine.jpg',
      // Judge coupon DEFAULT_TITLES + older demo rows (2026-04-16)
      'the last lighthouse':                 'img/films/the-last-lighthouse.jpg',
      'cipher of the drowned city':          'img/films/cipher-of-the-drowned-city.jpg',
      'echoes beneath glacier 9':            'img/films/echoes-beneath-glacier-9.jpg',
      'the cartographer of empty rooms':     'img/films/the-cartographer-of-empty-rooms.jpg',
      'pale horse, iron sky':                'img/films/pale-horse-iron-sky.jpg',
      'sub-orbital lullaby':                 'img/films/sub-orbital-lullaby.jpg',
      'glasshouse':                          'img/films/glasshouse.jpg',
      'the last transmission':               'img/films/the-last-transmission.jpg',
      'crypto whistleblow':                  'img/films/crypto-whistleblow.jpg',
    };

    // xAI temp CDN URLs expire after a few hours — don't trust them.
    const isEphemeralUrl = (url) =>
      typeof url === 'string' && /(imgen|vidgen|videos)\.x\.ai/.test(url);

    // Priority chain for the public-teaser poster.
    //   1. POSTER_MAP override (commissioner-curated, permanent)
    //   2. role='poster' or step_id='storyboard.poster*' with non-ephemeral URL
    //   3. any non-ephemeral storyboard image
    //   4. any non-ephemeral image
    //   5. ephemeral poster (last resort — may be dead)
    //   6. null → caller shows the bMovies placeholder card
    function pickPoster(artifacts, title) {
      const pKey = (title || '').toLowerCase().replace(/[!?.]+$/, '').trim();
      const override = POSTER_MAP[pKey] || POSTER_MAP[(title || '').toLowerCase()];
      if (override) return { url: override };
      const images = (artifacts || []).filter((a) => a.kind === 'image');
      const isPoster = (a) => a.role === 'poster' || (a.step_id || '').startsWith('storyboard.poster');
      const isStoryboard = (a) => a.role === 'storyboard' || (a.step_id || '').startsWith('storyboard.');
      const live = images.filter((a) => !isEphemeralUrl(a.url));
      return (
        live.find(isPoster) ||
        live.find(isStoryboard) ||
        live[0] ||
        images.find(isPoster) ||
        null
      );
    }

    function getOfferId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id') || params.get('offerId') || '';
    }

    async function loadOffer(id) {
      const { data } = await supabase
        .from('bct_offers')
        .select('id, title, synopsis, status, token_ticker, tier, commissioner_percent, current_step, production_phase, started_at, target_complete_at, revision_deadline, revisions_remaining, presale_open, token_mint_txid, parent_offer_id, account_id')
        .eq('id', id)
        .maybeSingle();
      return data;
    }

    /**
     * Determine what the current viewer is allowed to see:
     *   'commissioner'  owns the offer (offer.account_id matches user)
     *   'holder'        owns shares via bct_share_sales
     *   'judge'         has ?judge=<any-value> in the URL (soft bypass
     *                   baked into BSVA tour links so reviewers don't
     *                   hit a paywall)
     *   'public'        everyone else — sees the teaser + buy CTA
     *
     * Anything other than 'public' unlocks the full pipeline / artifacts
     * / step log / rough-cut player.
     */
    async function resolveAccessLevel(offer) {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('judge')) return 'judge';

        const { data: sessionRes } = await supabase.auth.getSession();
        const user = sessionRes?.session?.user;
        if (!user) return 'public';

        const { data: accountRow } = await supabase
          .from('bct_accounts')
          .select('id')
          .eq('auth_user_id', user.id)
          .maybeSingle();
        const accountId = accountRow?.id;
        if (!accountId) return 'public';

        if (offer.account_id && offer.account_id === accountId) {
          return 'commissioner';
        }

        const { data: shareRows } = await supabase
          .from('bct_share_sales')
          .select('id')
          .eq('offer_id', offer.id)
          .eq('buyer_account', accountId)
          .limit(1);
        if (shareRows && shareRows.length > 0) return 'holder';

        return 'public';
      } catch (err) {
        console.warn('[access] resolve failed, defaulting to public:', err);
        return 'public';
      }
    }

    function decodeDataUrl(url) {
      if (!url || !url.startsWith('data:text/plain')) return null;
      try {
        const idx = url.indexOf(',');
        if (idx < 0) return null;
        return decodeURIComponent(url.slice(idx + 1));
      } catch { return null; }
    }

    function formatTime(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return '—'; }
    }

    function shortTx(t) {
      if (!t) return '';
      return t.length > 18 ? t.slice(0, 10) + '…' + t.slice(-6) : t;
    }

    function computeStepStatuses(offer, log) {
      // For each pipeline step decide: done | active | pending | failed
      const statusByStep = {};
      const completedSet = new Set();
      const failedSet = new Set();
      for (const ev of log) {
        if (ev.status === 'completed') completedSet.add(ev.step_id);
        if (ev.status === 'failed') failedSet.add(ev.step_id);
      }
      for (const step of PIPELINE_STEPS) {
        if (failedSet.has(step.id)) statusByStep[step.id] = 'failed';
        else if (completedSet.has(step.id)) statusByStep[step.id] = 'done';
        else if (offer.current_step === step.id) statusByStep[step.id] = 'active';
        else statusByStep[step.id] = 'pending';
      }
      return statusByStep;
    }

    function computePhaseProgress(stepStatuses) {
      const byPhase = {};
      for (const step of PIPELINE_STEPS) {
        const p = step.phase;
        if (!byPhase[p]) byPhase[p] = { total: 0, done: 0, active: 0 };
        byPhase[p].total++;
        if (stepStatuses[step.id] === 'done') byPhase[p].done++;
        if (stepStatuses[step.id] === 'active') byPhase[p].active++;
      }
      return byPhase;
    }

    // ─── Rough cut player ───
    //
    // If the offer has at least one scene.N.video artifact, surface a
    // dedicated "Watch the cut" player that plays the scene clips in
    // sequence. Wiring happens AFTER innerHTML render via
    // wireRoughCutPlayer() because the HTML parser closes the outer
    // module on the literal close-script sequence regardless of context
    // (inside string literals, inside comments, anywhere).
    let _roughCutPlaylist = [];
    function renderRoughCutPlayer(artifacts) {
      const sceneClips = artifacts
        .filter(a => a.kind === 'video' && a.step_id && a.step_id.startsWith('scene.'))
        .sort((a, b) => (a.step_id || '').localeCompare(b.step_id || ''));
      _roughCutPlaylist = sceneClips.map(c => c.url);
      if (sceneClips.length === 0) return '';

      const totalSec = sceneClips.length * 8;

      return `
        <div style="border:1px solid #2a2a2a;background:#0a0a0a;padding:1.5rem;margin-top:1.5rem;">
          <div style="font-size:0.55rem;color:#e50914;text-transform:uppercase;letter-spacing:0.16em;font-weight:900;">Rough cut · ${sceneClips.length} scenes · ${totalSec} sec runtime</div>
          <h2 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;margin-top:0.4rem;border:none;padding:0;">Watch the cut</h2>
          <p style="font-size:0.78rem;color:#888;margin-top:0.4rem;line-height:1.55;">
            Generated by the editor agent from the Phase 2 scene clips. Each clip is a real Grok Imagine 8-second video. The player below auto-advances through the cut.
          </p>
          <div style="position:relative;margin-top:1rem;background:#000;">
            <video id="rough-cut-player" controls preload="metadata" style="width:100%;display:block;background:#000;" src="${esc(sceneClips[0].url)}"></video>
            <div id="rough-cut-overlay" style="position:absolute;top:0.6rem;right:0.8rem;background:rgba(0,0,0,0.7);padding:0.3rem 0.6rem;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#fff;pointer-events:none;">
              Scene <span id="rough-cut-idx">1</span> / ${sceneClips.length}
            </div>
          </div>
          <div style="display:flex;gap:0.4rem;margin-top:0.6rem;flex-wrap:wrap;">
            ${sceneClips.map((c, i) => `
              <button type="button" class="rough-cut-thumb" data-idx="${i}" style="padding:0.4rem 0.7rem;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:0.65rem;font-family:'JetBrains Mono',monospace;cursor:pointer;">
                Scene ${i + 1}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function wireRoughCutPlayer() {
      if (_roughCutPlaylist.length === 0) return;
      const player = document.getElementById('rough-cut-player');
      const idxEl = document.getElementById('rough-cut-idx');
      const thumbs = document.querySelectorAll('.rough-cut-thumb');
      if (!player || !idxEl) return;
      let current = 0;
      function load(i) {
        if (i < 0 || i >= _roughCutPlaylist.length) return;
        current = i;
        player.src = _roughCutPlaylist[i];
        player.play().catch(() => {});
        idxEl.textContent = String(i + 1);
        thumbs.forEach((b, j) => {
          b.style.background = j === i ? '#e50914' : '#1a1a1a';
          b.style.borderColor = j === i ? '#e50914' : '#2a2a2a';
          b.style.color = j === i ? '#fff' : '#aaa';
        });
      }
      player.addEventListener('ended', () => {
        if (current + 1 < _roughCutPlaylist.length) load(current + 1);
      });
      thumbs.forEach((b, j) => b.addEventListener('click', () => load(j)));
      // Mark the first thumb selected
      load(0);
    }

    function renderArtifactCard(art) {
      const title = (art.step_id || art.role || '').replace(/[._]/g, ' ');
      const versionBadge = art.version > 1 ? `<span style="font-size:0.55rem;color:#e8c46b;background:#2a2206;padding:0.2rem 0.4rem;margin-left:0.4rem;">v${art.version}</span>` : '';
      if (art.kind === 'image') {
        return `
          <div class="art-card">
            <a href="${esc(art.url)}" target="_blank" rel="noopener">
              <img src="${esc(art.url)}" alt="${esc(title)}" loading="lazy" />
            </a>
            <div class="art-meta">
              <div class="art-title">${esc(title)} ${versionBadge}</div>
              <div class="art-sub">${esc(art.role || '')} · ${esc(art.model || '')}</div>
            </div>
          </div>
        `;
      }
      if (art.kind === 'video') {
        return `
          <div class="art-card">
            <video src="${esc(art.url)}" controls preload="metadata"></video>
            <div class="art-meta">
              <div class="art-title">${esc(title)} ${versionBadge}</div>
              <div class="art-sub">${esc(art.role || '')} · ${esc(art.model || '')}</div>

        `;
      }
      if (art.kind === 'audio') {
        return `
          <div class="art-card">
            <audio src="${esc(art.url)}" controls preload="metadata" style="width:100%;"></audio>
            <div class="art-meta">
              <div class="art-title">${esc(title)} ${versionBadge}</div>
              <div class="art-sub">${esc(art.role || '')} · ${esc(art.model || '')}</div>
            </div>
          </div>
        `;
      }
      // text — show first 280 chars + a "read more" link that opens a
      // modal. We do NOT use <a href="data:..."> because Chrome and
      // Firefox both block top-level navigation to data: URLs (a
      // long-standing anti-phishing measure). Modal display keeps the
      // user on the page and doesn't trip any browser security policy.
      const decoded = decodeDataUrl(art.url) || '';
      const preview = decoded.slice(0, 280);
      const truncated = decoded.length > 280;
      return `
        <div class="art-card art-text">
          <div class="art-text-preview">${esc(preview)}${truncated ? '…' : ''}</div>

    // ─── Text artifact modal ───
    //
    // Lazy-loads any text artifact into a full-screen modal when the
    // user clicks "Open full document". Because we hold every loaded
    // artifact in the render() closure, we look up the artifact by id
    // from the most recent tick's `artifacts` array (cached on
    // window._lastArtifacts).
    function openTextArtifactModal(artId) {
      const arts = window._lastArtifacts || [];
      const art = arts.find(a => Number(a.id) === Number(artId));
      if (!art) return;
      const decoded = decodeDataUrl(art.url) || '(empty)';
      const title = (art.step_id || art.role || '').replace(/[._]/g, ' ');
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:2rem;';
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      const box = document.createElement('div');
      box.style.cssText = 'max-width:780px;width:100%;max-height:90vh;background:#0a0a0a;border:1px solid #333;display:flex;flex-direction:column;';
      const head = document.createElement('div');
      head.style.cssText = 'padding:1.2rem 1.5rem;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;';
      head.innerHTML = `
        <div>
          <div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;">${esc(art.role || '')} · ${esc(art.model || '')} · ${decoded.length} chars</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;margin-top:0.2rem;text-transform:capitalize;">${esc(title)}</div>
        </div>
        <button type="button" id="modal-close" style="background:none;border:1px solid #444;color:#fff;padding:0.4rem 0.8rem;cursor:pointer;font:inherit;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;">Close</button>
      `;
      const body = document.createElement('div');
      body.style.cssText = 'padding:1.5rem;overflow-y:auto;font-size:0.85rem;color:#ddd;line-height:1.7;white-space:pre-wrap;font-family:"Inter",sans-serif;';
      body.textContent = decoded;
      box.appendChild(head);
      box.appendChild(body);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
      head.querySelector('#modal-close')?.addEventListener('click', () => overlay.remove());
      // ESC key closes
      const onKey = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
      document.addEventListener('keydown', onKey);
    }

    /**

     * Visual-first by design: this is the panel the PDF Chapter 03
     * "Don't like the ending? Recut it" promise points at. Wiring the
     * full edit canvas (timeline drag-reorder, frame inpainting, font

    function wireRecutDeck(offerId) {
      document.querySelectorAll('.recut-card .recut-btn').forEach(btn => {
        btn.addEventListener('click', async (ev) => {
          const card = ev.currentTarget.closest('.recut-card');
          if (!card) return;
          const step = card.getAttribute('data-step');
          const promptText = card.getAttribute('data-prompt') || 'Describe the change';
          const note = window.prompt(promptText);
          if (!note || !note.trim()) return;
          btn.disabled = true;
          btn.textContent = 'Queueing…';
          try {
            const res = await fetch('/api/feature/revise', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ offerId, step, note }),
            });
            const j = await res.json();
            if (!res.ok || j.error) {
              btn.textContent = '⚠ ' + (j.error || res.statusText);
              setTimeout(() => { btn.disabled = false; btn.textContent = 'Apply →'; }, 4000);
              return;
            }
            btn.textContent = '✓ Queued';
            setTimeout(() => { window.location.reload(); }, 1500);
          } catch (err) {
            btn.textContent = '⚠ ' + (err.message || 'failed');
            setTimeout(() => { btn.disabled = false; btn.textContent = 'Apply →'; }, 4000);
          }
        });
      });
    }

        return `
          <div class="phase ${cls}">

            <div class="name">${meta.name}</div>

            </div>
            <div style="border:1px solid #1a1a1a;padding:0.7rem;">
              <div style="color:#888;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;">Mint TX</div>
              <div style="color:#888;font-weight:700;margin-top:0.3rem;font-size:0.6rem;">${offer.token_mint_txid ? esc(offer.token_mint_txid).slice(0, 20) + '…' : '—'}</div>
            </div>
          </div>
          <div style="margin-top:1rem;display:flex;gap:0.6rem;flex-wrap:wrap;">
            <a href="/deck.html?id=${encodeURIComponent(offer.id)}" target="_blank" style="display:inline-block;padding:0.7rem 1.2rem;background:#e50914;border:1px solid #e50914;color:#fff;text-decoration:none;font-size:0.65rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;">Investor deck (printable PDF) →</a>
            <a href="/film.html?id=${encodeURIComponent(offer.id)}" style="display:inline-block;padding:0.7rem 1.2rem;background:#1a1a1a;border:1px solid #444;color:#fff;text-decoration:none;font-size:0.65rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;">Public film page →</a>
          </div>

          <!-- Commissioner-only "list shares for sale" form. Posts to
               /api/feature/list-shares?action=create which inserts a row
               in bct_share_listings. The grid below renders every open
               listing with a "Buy" button that opens Stripe checkout. -->
          <div style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid #1a1a1a;">
            <div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;margin-bottom:0.6rem;">List shares for sale (commissioner only)</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.6rem;align-items:end;">
              <div>
                <label style="display:block;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:#666;">Shares to sell</label>
                <input id="ls-shares" type="number" min="100000" step="100000" placeholder="10000000" style="width:100%;margin-top:0.3rem;padding:0.6rem;background:#000;border:1px solid #333;color:#fff;font-family:'JetBrains Mono',monospace;font-size:0.8rem;" />
              </div>
              <div>
                <label style="display:block;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:#666;">Price per share (¢)</label>
                <input id="ls-price" type="number" min="1" step="1" placeholder="1" style="width:100%;margin-top:0.3rem;padding:0.6rem;background:#000;border:1px solid #333;color:#fff;font-family:'JetBrains Mono',monospace;font-size:0.8rem;" />
              </div>
              <div>
                <label style="display:block;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:#666;">Estimated total</label>
                <div id="ls-total" style="margin-top:0.3rem;padding:0.6rem;background:#0a0a0a;border:1px solid #1a1a1a;color:#6bff8a;font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:700;">$0.00</div>
              </div>
              <button id="ls-create" type="button" style="padding:0.6rem 1.2rem;background:#e50914;border:1px solid #e50914;color:#fff;font-family:inherit;font-size:0.65rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;">List →</button>
            </div>
            <div id="ls-status" style="margin-top:0.6rem;font-size:0.7rem;color:#888;min-height:1em;"></div>
          </div>

          ${renderListingsBlock(offer, listings)}
        </div>

        <!-- ─── THE RECUT DECK ───
             Creative recut tools. Each tool is a one-click instruction
             to a specific specialist to redo a piece of work. The tools
             post to /api/feature/revise with a pre-filled step + note,
             same backend as the free-form "Re-run any step" textarea
             below. The free-form one is the power-user mode; this is
             the keep-it-simple mode. Visual scaffold for the PDF
             promise: "Don't like the ending? Recut it." -->
        ${renderRecutDeck(offer, artifacts)}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
          <div style="border:1px solid #2a2a2a;background:#0a0a0a;padding:1.4rem;">
            <div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;">Request a revision · power user</div>
            <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff;margin-top:0.4rem;">Re-run any step with a note</h3>
            <select id="rev-step" style="width:100%;margin-top:0.8rem;padding:0.6rem;background:#000;border:1px solid #333;color:#fff;font-family:inherit;font-size:0.8rem;">
              ${PIPELINE_STEPS.filter(s => !s.id.startsWith('producer.token_mint') && !s.id.endsWith('.kickoff') && !s.id.endsWith('.draft_open')).map(s => `<option value="${esc(s.id)}">${esc(s.label)}</option>`).join('')}
            </select>
            <textarea id="rev-note" placeholder="e.g. Make the dialogue in scene 5 more menacing, push the score louder under the climax." style="width:100%;margin-top:0.6rem;padding:0.7rem;background:#000;border:1px solid #333;color:#fff;font-family:inherit;font-size:0.85rem;resize:vertical;min-height:80px;"></textarea>
            <button id="rev-submit" type="button" style="margin-top:0.8rem;padding:0.8rem 1.4rem;background:#e50914;border:1px solid #e50914;color:#fff;font-family:inherit;font-size:0.7rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Queue revision (${offer.revisions_remaining} left) →</button>
            <div id="rev-status" style="margin-top:0.8rem;font-size:0.75rem;color:#aaa;min-height:1em;"></div>
          </div>
          <div style="border:1px solid #2a2a2a;background:#0a0a0a;padding:1.4rem;">
            <div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;">Publish</div>
            <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff;margin-top:0.4rem;">Ship the film</h3>
            <p style="font-size:0.78rem;color:#aaa;line-height:1.55;margin-top:0.6rem;">When you click publish the film moves out of draft, the presale closes, and it appears on /watch.html. Ticket revenue starts flowing immediately to royalty shareholders. This is irreversible.</p>
            <button id="pub-submit" type="button" style="margin-top:1rem;padding:0.9rem 1.6rem;background:#1f4d2a;border:1px solid #6bff8a;color:#6bff8a;font-family:inherit;font-size:0.7rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Publish to /watch.html →</button>
            <div id="pub-status" style="margin-top:0.8rem;font-size:0.75rem;color:#aaa;min-height:1em;"></div>
            <div style="margin-top:1rem;padding-top:0.8rem;border-top:1px solid #1a1a1a;font-size:0.7rem;color:#666;">
              Auto-publishes at <strong style="color:#e8c46b;">${formatTime(offer.revision_deadline)}</strong> if you don't.
            </div>
          </div>
        </div>
      ` : '';

      const stepsHtml = PIPELINE_STEPS.map(step => {
        const st = stepStatuses[step.id] || 'pending';
        const eventsForStep = log.filter(e => e.step_id === step.id);
        const lastEvent = eventsForStep[0]; // log is desc
        const tx = lastEvent?.payment_txid;
        const ts = lastEvent ? formatTime(lastEvent.created_at) : '';
        return `
          <div class="step ${st}">
            <div class="dot"></div>
            <div class="info">
              <div class="step-name">${esc(step.label)}</div>
              <div class="step-meta">${esc(step.id)}${lastEvent?.agent_id ? ' · ' + esc(lastEvent.agent_id) : ''}</div>
            </div>
            <div class="right">${ts}${tx ? '<br>' + esc(shortTx(tx)) : ''}</div>
          </div>
        `;
      }).join('');

      const tailHtml = log.length === 0
        ? '<div class="empty">No events yet. Worker will pick up the offer within ~30 seconds.</div>'
        : log.slice(0, 30).map(ev => {
            const cls = `status-${ev.status}`;
            return `
              <div class="event">
                <span class="ts">${formatTime(ev.created_at)}</span>
                · <span class="step">${esc(ev.step_id)}</span>
                · <span class="${cls}">${esc(ev.status)}</span>
                ${ev.agent_id ? '· ' + esc(ev.agent_id) : ''}
                ${ev.message ? `<div class="msg">${esc(ev.message)}</div>` : ''}
                ${ev.payment_txid ? `<div class="tx">tx ${esc(shortTx(ev.payment_txid))}</div>` : ''}
              </div>
            `;
          }).join('');

      const cumulativeTx = log.filter(e => e.payment_txid).length;

      root.innerHTML = `
        <div class="head">
          <div class="kicker">Live production</div>
          <h1>${esc(offer.title)}</h1>
          <div class="ticker">$${esc(offer.token_ticker)} · ${esc((offer.tier || 'feature').toUpperCase())} tier · commissioner owns ${esc(offer.commissioner_percent)}%</div>
          <div class="meta-row">
            <div class="meta-cell">
              <div class="label">Status</div>
              <div class="value ${isPublished ? 'green' : isDraft ? 'red' : ''}">${esc(offer.status)}</div>
            </div>
            <div class="meta-cell">
              <div class="label">Current step</div>
              <div class="value">${esc(offer.current_step || '—')}</div>
            </div>
            <div class="meta-cell">
              <div class="label">On-chain TXs</div>
              <div class="value">${cumulativeTx}</div>
            </div>
            <div class="meta-cell">
              <div class="label">${isDraft ? 'Revisions left' : 'Phase'}</div>
              <div class="value">${isDraft ? offer.revisions_remaining : esc(offer.production_phase || '—')}</div>
            </div>
          </div>
          <div class="phases">${phaseStrip}</div>
        </div>

        ${draftBanner}

        <div class="layout">
          <div class="timeline">
            <h2>Pipeline · ${PIPELINE_STEPS.length} steps</h2>
            ${stepsHtml}
          </div>
          <div class="tail">
            <h2>Live tail</h2>
            ${tailHtml}
          </div>
        </div>

        ${renderRoughCutPlayer(artifacts)}

        <div class="deliverables">
          <h2>Deliverables · ${artifacts.length}</h2>
          <div class="sub">Every artifact the swarm has produced so far. Older versions are kept on-chain; this view shows only the current head of each (offer, role, kind).</div>
          ${artifacts.length === 0
            ? '<div class="empty">No deliverables yet. Worker is still in early phase.</div>'
            : `<div class="art-grid">${artifacts.map(renderArtifactCard).join('')}</div>`
          }
        </div>

        ${artifacts.length > 0 ? `
        <div style="border:1px solid #222;background:#0a0a0a;padding:1.5rem;margin-top:1.5rem;" id="audit-trail-section">
          <div style="font-size:0.55rem;color:#E50914;letter-spacing:0.18em;text-transform:uppercase;font-weight:900;">BRC-77</div>
          <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;margin-top:0.3rem;margin-bottom:0.4rem;border:none;padding:0;">Cryptographic audit trail</h2>
          <div style="font-size:0.75rem;color:#777;margin-bottom:1rem;">Every artifact is signed by the platform key on behalf of the producing agent. Signatures are verifiable with the platform public key.</div>
          <div id="audit-trail-body" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#888;">Loading signatures...</div>
        </div>
        ` : ''}
      `;

      // Wire the rough cut player + draft-only action buttons after
      // the innerHTML render. The rough cut player runs for every
      // offer that has scene clips (in-progress or draft); the draft
      // action buttons (revise / publish / list shares) only show in
      // draft state.
      wireRoughCutPlayer();
      if (isDraft) {
        wireDraftActions(offer);
        wireRecutDeck(offer.id);
      }

      // Cache the current artifacts on window so the text-modal opener
      // (called from .art-read-more click handlers) can look them up
      // without re-fetching from Supabase.
      window._lastArtifacts = artifacts;
      document.querySelectorAll('.art-read-more').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-art-id');
          if (id) openTextArtifactModal(id);
        });
      });

      // Load BRC-77 audit trail (non-blocking, fires after main render)
      if (artifacts.length > 0) {
        loadAuditTrail(offer.id);
      }
    }

    // ─── BRC-77 Audit Trail ───
    //
    // Loads production step signatures from /api/certificates/production-step
    // and renders them in a table below the deliverables section.
    let _auditTrailLoaded = '';
    async function loadAuditTrail(offerId) {
      // Only load once per offer (avoid re-fetching on every 5s tick)
      if (_auditTrailLoaded === offerId) return;
      const body = document.getElementById('audit-trail-body');
      if (!body) return;

      try {
        const res = await fetch(`/api/certificates/production-step?offerId=${encodeURIComponent(offerId)}`);
        if (!res.ok) {
          body.textContent = 'Failed to load audit trail.';
          return;
        }
        const data = await res.json();
        _auditTrailLoaded = offerId;

        if (!data.steps || data.steps.length === 0) {
          body.textContent = 'No signed artifacts yet.';
          return;
        }

        const ROLE_COLORS = {
          writer: '#3B82F6', director: '#E50914', cinematographer: '#F59E0B',
          storyboard: '#8B5CF6', editor: '#10B981', composer: '#EC4899',
          sound_designer: '#6366F1', producer: '#F97316',
        };

        let html = `
          <div style="font-size:0.6rem;color:#555;margin-bottom:0.8rem;">Platform public key: <span style="color:#888;">${esc(data.publicKey?.slice(0, 20))}...${esc(data.publicKey?.slice(-12))}</span></div>
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid #222;">
                <th style="text-align:left;padding:0.4rem 0.6rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Step</th>
                <th style="text-align:left;padding:0.4rem 0.6rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Agent</th>
                <th style="text-align:left;padding:0.4rem 0.6rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Artifact</th>
                <th style="text-align:left;padding:0.4rem 0.6rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Hash</th>
                <th style="text-align:left;padding:0.4rem 0.6rem;font-size:0.55rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Signature</th>
              </tr>
            </thead>
            <tbody>
        `;

        for (const step of data.steps) {
          const roleColor = ROLE_COLORS[step.agentRole] || '#888';
          const sigShort = step.signature.length > 32 ? step.signature.slice(0, 12) + '...' + step.signature.slice(-8) : step.signature;
          const hashShort = step.artifactHash.slice(0, 10) + '...' + step.artifactHash.slice(-6);
          html += `
            <tr style="border-bottom:1px solid #111;">
              <td style="padding:0.4rem 0.6rem;color:#ddd;white-space:nowrap;">${esc((step.stepId || '').replace(/[._]/g, ' '))}</td>
              <td style="padding:0.4rem 0.6rem;"><span style="color:${roleColor};">${esc(step.agentName)}</span> <span style="color:#555;font-size:0.6rem;">${esc(step.agentRole)}</span></td>
              <td style="padding:0.4rem 0.6rem;color:#888;">${esc(step.artifactKind)}</td>
              <td style="padding:0.4rem 0.6rem;color:#888;" title="${esc(step.artifactHash)}">${esc(hashShort)}</td>
              <td style="padding:0.4rem 0.6rem;color:#6bff8a;" title="${esc(step.signature)}">${esc(sigShort)}</td>
            </tr>
          `;
        }

        html += '</tbody></table>';
        html += `<div style="font-size:0.6rem;color:#555;margin-top:0.8rem;">${data.steps.length} artifact${data.steps.length === 1 ? '' : 's'} signed by platform key. Each signature covers the artifact hash + agent identity + step metadata.</div>`;
        body.innerHTML = html;
      } catch (err) {
        console.warn('[audit-trail] Failed to load:', err);
        body.textContent = 'Audit trail unavailable.';
      }
    }

    function wireDraftActions(offer) {
      const revBtn = document.getElementById('rev-submit');
      const revStep = document.getElementById('rev-step');
      const revNote = document.getElementById('rev-note');
      const revStatus = document.getElementById('rev-status');
      if (revBtn && revStep && revNote && revStatus) {
        revBtn.addEventListener('click', async () => {
          const note = revNote.value.trim();
          if (note.length < 4) {
            revStatus.textContent = 'Tell the agents what to change first.';
            revStatus.style.color = '#ff6464';
            return;
          }
          revBtn.disabled = true;
          revStatus.textContent = 'Queueing…';
          revStatus.style.color = '#aaa';
          try {
            const res = await fetch('/api/feature/revise', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                offerId: offer.id,
                stepId: revStep.value,
                scope: 'scene',
                note,
              }),
            });
            const body = await res.json();
            if (!res.ok) throw new Error(body.message || body.error || `HTTP ${res.status}`);
            revStatus.style.color = '#6bff8a';
            revStatus.textContent = `Queued. Worker will run "${revStep.value}" within ~30 sec. ${body.remainingBudget} revisions left.`;
            revNote.value = '';
            revBtn.disabled = false;
          } catch (err) {
            revStatus.style.color = '#ff6464';
            revStatus.textContent = 'Failed: ' + (err.message || err);
            revBtn.disabled = false;
          }
        });
      }

      // ─── Share listing form ───
      const lsShares = document.getElementById('ls-shares');
      const lsPrice = document.getElementById('ls-price');
      const lsTotal = document.getElementById('ls-total');
      const lsCreate = document.getElementById('ls-create');
      const lsStatus = document.getElementById('ls-status');
      function recomputeTotal() {
        if (!lsShares || !lsPrice || !lsTotal) return;
        const s = Math.floor(Number(lsShares.value || 0));
        const p = Math.floor(Number(lsPrice.value || 0));
        const totalCents = s * p;
        lsTotal.textContent = isFinite(totalCents)
          ? '$' + (totalCents / 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
          : '$0.00';
      }
      lsShares?.addEventListener('input', recomputeTotal);
      lsPrice?.addEventListener('input', recomputeTotal);
      lsCreate?.addEventListener('click', async () => {
        const sharesOffered = Math.floor(Number(lsShares?.value || 0));
        const pricePerShareCents = Math.floor(Number(lsPrice?.value || 0));
        if (sharesOffered < 100000 || pricePerShareCents < 1) {
          lsStatus.textContent = 'Min 100,000 shares (0.01% of supply) and at least 1¢ per share.';
          lsStatus.style.color = '#ff6464';
          return;
        }
        lsCreate.disabled = true;
        lsStatus.textContent = 'Creating listing…';
        lsStatus.style.color = '#aaa';
        try {
          const res = await fetch('/api/feature/list-shares?action=create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ offerId: offer.id, sharesOffered, pricePerShareCents }),
          });
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          lsStatus.style.color = '#6bff8a';
          lsStatus.textContent = `Listing #${body.listingId} created (${body.percent.toFixed(4)}% for $${(body.totalPriceCents / 100).toFixed(2)}).`;
          if (lsShares) lsShares.value = '';
          if (lsPrice) lsPrice.value = '';
          recomputeTotal();
          // Trigger an immediate refresh so the new listing appears
          tick();
        } catch (err) {
          lsStatus.style.color = '#ff6464';
          lsStatus.textContent = 'Failed: ' + (err.message || err);
        } finally {
          lsCreate.disabled = false;
        }
      });

      // ─── Buy buttons on existing listings ───
      document.querySelectorAll('.buy-listing-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const listingId = Number(btn.dataset.listing);
          if (!listingId) return;
          btn.disabled = true;
          btn.textContent = 'Loading…';
          try {
            const res = await fetch('/api/feature/list-shares?action=buy', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ listingId }),
            });
            const body = await res.json();
            if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
            if (body.url) {
              window.location.href = body.url;
            } else {
              throw new Error('no checkout URL');
            }
          } catch (err) {
            btn.textContent = 'Buy';
            btn.disabled = false;
            alert('Buy failed: ' + (err.message || err));
          }
        });
      });

      const pubBtn = document.getElementById('pub-submit');
      const pubStatus = document.getElementById('pub-status');
      if (pubBtn && pubStatus) {
        pubBtn.addEventListener('click', async () => {
          if (!confirm('Publish this film to /watch.html? This is irreversible.')) return;
          pubBtn.disabled = true;
          pubStatus.textContent = 'Publishing…';
          pubStatus.style.color = '#aaa';
          try {
            const res = await fetch('/api/feature/publish', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ offerId: offer.id }),
            });
            const body = await res.json();
            if (!res.ok) throw new Error(body.message || body.error || `HTTP ${res.status}`);
            pubStatus.style.color = '#6bff8a';
            pubStatus.textContent = 'Published. Redirecting to /watch.html…';
            setTimeout(() => { window.location.href = body.watchUrl || '/watch.html'; }, 1200);
          } catch (err) {
            pubStatus.style.color = '#ff6464';
            pubStatus.textContent = 'Failed: ' + (err.message || err);
            pubBtn.disabled = false;
          }
        });
      }
    }

    // ─── Public teaser render ──────────────────────────────────
    //
    // Shown to anyone who's NOT the commissioner, a share holder, or
    // a judge. Reveals: poster, title/ticker/tier, logline, synopsis,
    // trailer (if available), progress bar; hides: the step log, raw
    // artifacts, rough-cut player, and audit trail. Drops a "buy a
    // share" CTA in place of the pipeline.
    function renderPublicTeaser(offer, log, artifacts) {
      const poster = pickPoster(artifacts, offer.title);
      const trailer = artifacts.find(a =>
        a.kind === 'video' && (a.role === 'trailer' || (a.step_id || '').startsWith('editor.trailer_cut'))
      );
      const loglineArt = artifacts.find(a =>
        (a.step_id || '').startsWith('writer.logline')
      );
      const logline = loglineArt ? (decodeDataUrl(loglineArt.url) || '') : '';

      // Phase progress WITHOUT revealing per-step artifacts
      const completedSet = new Set(log.filter(e => e.status === 'completed').map(e => e.step_id));
      const total = PIPELINE_STEPS.length;
      const done = PIPELINE_STEPS.filter(s => completedSet.has(s.id)).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);

      const posterHtml = poster
        ? `<div style="border:1px solid #222;background:#050505;overflow:hidden;max-width:320px;">
             <img src="${esc(poster.url)}" alt="${esc(offer.title)} poster" style="width:100%;display:block;" />
           </div>`
        : `<div style="width:320px;aspect-ratio:2/3;background:linear-gradient(135deg,#1a0003,#0a0000);border:1px solid #222;display:flex;align-items:center;justify-content:center;">
             <div style="font-family:'Bebas Neue',sans-serif;font-size:4rem;color:#333;font-weight:900;">b<span style="color:#E50914;">M</span></div>
           </div>`;

      const trailerHtml = trailer
        ? `<div style="margin-top:1.5rem;background:#000;border:1px solid #222;">
             <div style="font-size:0.55rem;color:#e50914;text-transform:uppercase;letter-spacing:0.16em;font-weight:900;padding:0.8rem 1rem 0;">Official trailer</div>
             <video controls preload="metadata" style="width:100%;display:block;background:#000;margin-top:0.5rem;" src="${esc(trailer.url)}"></video>
           </div>`
        : '';

      root.innerHTML = `
        <div class="head">
          <div class="kicker">Public preview</div>
          <h1>${esc(offer.title)}</h1>
          <div class="ticker">$${esc(offer.token_ticker)} · ${esc((offer.tier || 'feature').toUpperCase())} tier</div>
        </div>

        <div style="display:grid;grid-template-columns:320px 1fr;gap:2rem;margin-top:2rem;align-items:start;">
          ${posterHtml}
          <div>
            ${logline ? `<div style="font-size:0.55rem;color:#e50914;text-transform:uppercase;letter-spacing:0.18em;font-weight:900;margin-bottom:0.6rem;">Logline</div>
              <p style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;line-height:1.15;margin-bottom:1.6rem;">${esc(logline)}</p>` : ''}

            ${offer.synopsis ? `<div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.18em;font-weight:900;margin-bottom:0.4rem;">Synopsis</div>
              <p style="color:#bbb;font-size:0.9rem;line-height:1.6;margin-bottom:1.6rem;">${esc(offer.synopsis)}</p>` : ''}

            <div style="font-size:0.55rem;color:#888;text-transform:uppercase;letter-spacing:0.18em;font-weight:900;margin-bottom:0.4rem;">Production progress</div>
            <div style="height:10px;background:#111;border:1px solid #222;margin-bottom:0.4rem;">
              <div style="height:100%;background:linear-gradient(90deg,#E50914,#ff4757);width:${pct}%;"></div>
            </div>
            <div style="font-size:0.7rem;color:#888;margin-bottom:1.6rem;">${done} of ${total} steps complete · ${pct}%</div>
          </div>
        </div>

        ${trailerHtml}

        <div style="margin-top:2.4rem;border:1px solid #E50914;background:linear-gradient(135deg,#1a0003,#0a0000);padding:2rem;">
          <div style="font-size:0.55rem;color:#E50914;text-transform:uppercase;letter-spacing:0.18em;font-weight:900;margin-bottom:0.4rem;">
            Access-controlled
          </div>
          <h2 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;margin:0 0 0.4rem;border:none;padding:0;">
            The production room is for <span style="color:#E50914;">holders only</span>
          </h2>
          <p style="color:#bbb;font-size:0.9rem;line-height:1.6;max-width:640px;margin-bottom:1.4rem;">
            The 28-step pipeline, live step log, raw artifacts, on-chain audit trail, and
            rough-cut player are visible to the commissioner and anyone holding a royalty
            share in $${esc(offer.token_ticker)}. Buy a share to unlock full access — it's
            also how you earn royalties from every ticket this film sells.
          </p>
          <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
            <a href="/offer.html?id=${encodeURIComponent(offer.id)}"
               style="display:inline-block;padding:0.65rem 1.1rem;background:#E50914;color:#fff;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">
              Buy a share →
            </a>
            <a href="/marketplace.html?offer=${encodeURIComponent(offer.id)}"
               style="display:inline-block;padding:0.65rem 1.1rem;background:transparent;color:#E50914;border:1px solid #E50914;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">
              Secondary market
            </a>
            <a href="/film.html?id=${encodeURIComponent(offer.id)}"
               style="display:inline-block;padding:0.65rem 1.1rem;background:transparent;color:#888;border:1px solid #333;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">
              Film page
            </a>
            <a href="/login"
               style="display:inline-block;padding:0.65rem 1.1rem;background:transparent;color:#888;border:1px solid #333;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;">
              Sign in if you're a holder
            </a>
          </div>
        </div>
      `;
    }

    let lastTxCount = 0;
    let lastRenderHash = '';
    let lastAccessLevel = null; // cache so we don't re-check every 5s
    async function tick() {
      const id = getOfferId();
      if (!id) {
        root.innerHTML = '<div class="empty"><h2 style="font-family:Bebas Neue;font-size:2rem;color:#888;">Missing ?id= parameter</h2></div>';
        return;
      }
      const [offer, log, artifacts, listings] = await Promise.all([
        loadOffer(id),
        loadStepLog(id),
        loadArtifacts(id),
        loadShareListings(id),
      ]);
      if (!offer) {
        root.innerHTML = `<div class="empty"><h2 style="font-family:Bebas Neue;font-size:2rem;color:#888;">Production not found</h2><p>${esc(id)}</p></div>`;
        return;
      }

      // Resolve access tier on first tick only — cached afterwards so
      // the 5-second poll doesn't slam auth + share lookups. Login
      // changes are picked up on next full page load, which is fine.
      if (lastAccessLevel === null) {
        lastAccessLevel = await resolveAccessLevel(offer);
        console.info(`[production] access level: ${lastAccessLevel}`);
      }
      if (lastAccessLevel === 'public') {
        // Public teaser — render once and stop polling for changes.
        // Anything past this early-return (full render, rough-cut
        // player, audit trail) is holder-only.
        renderPublicTeaser(offer, log, artifacts);
        return;
      }
      // Skip the full re-render if nothing actually changed. Without
      // this guard the rough cut video player gets destroyed every 5
      // seconds (when innerHTML is replaced) and playback resets to
      // the start of the current clip. The hash includes everything
      // that affects the visible page so any real update still flows
      // through.
      const hash = [
        offer.status,
        offer.current_step,
        offer.production_phase,
        offer.revisions_remaining,
        offer.token_mint_txid,
        log.length,
        artifacts.length,
        listings.length,
        listings.filter(l => l.status === 'open').length,
      ].join('|');
      if (hash === lastRenderHash) return;
      lastRenderHash = hash;
      render(offer, log, artifacts, listings);
      // Pulse the TX counter when it grew
      const txCount = log.filter(e => e.payment_txid).length;
      if (txCount > lastTxCount) {
        const nodes = document.querySelectorAll('.meta-cell');
        for (const node of nodes) {
          if (node.querySelector('.label')?.textContent === 'On-chain TXs') {
            const v = node.querySelector('.value');
            if (v) {
              v.classList.remove('pulse');
              void v.offsetWidth; // restart animation
              v.classList.add('pulse');
            }
          }
        }
      }
      lastTxCount = txCount;
    }

    tick();
    setInterval(tick, 5000);
  </script>
  <script type="module" src="js/nav-session.js"></script>
</body>
</html>
